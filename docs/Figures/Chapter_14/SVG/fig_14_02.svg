<rect x="450" y="560" width="300" height="84" rx="14" ry="14" class="govern"/>
<text x="600" y="613" text-anchor="middle" font-size="30" font-weight="700" class="label">Review</text>

<rect x="830" y="560" width="300" height="84" rx="14" ry="14" class="govern"/>
<text x="980" y="613" text-anchor="middle" font-size="29" font-weight="700" class="label">Provenance</text>

<rect x="330" y="700" width="540" height="86" rx="14" ry="14" class="repo"/>
<text x="600" y="755" text-anchor="middle" font-size="34" font-weight="700" class="label">Repository Evidence</text>

