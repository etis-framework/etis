<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860">
  <defs>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; fill: #182230; }
      .small { font-size: 25px; }
      .med { font-size: 30px; font-weight: 700; }
      .tiny { font-size: 22px; }
      .line { stroke:#222; stroke-width:4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .dash { stroke:#596575; stroke-width:3.4; fill:none; stroke-dasharray:8 8; stroke-linecap:round; stroke-linejoin:round; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#222" />
    </marker>
    <marker id="arrowMuted" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#596575" />
    </marker>
  </defs>
  <rect x="0" y="0" width="1600" height="860" fill="#ffffff"/>

  <!-- Left inputs -->
  <rect x="70" y="80" width="330" height="120" rx="12" fill="#f8f8f6" stroke="#243040" stroke-width="3"/>
  <text x="235" y="126" text-anchor="middle" class="label med">Current</text>
  <text x="235" y="163" text-anchor="middle" class="label med">Trust Claim</text>

  <rect x="70" y="240" width="330" height="120" rx="12" fill="#f8f8f6" stroke="#243040" stroke-width="3"/>
  <text x="235" y="286" text-anchor="middle" class="label med">Current</text>
  <text x="235" y="323" text-anchor="middle" class="label med">Evidence</text>

  <rect x="70" y="400" width="330" height="120" rx="12" fill="#f8f8f6" stroke="#243040" stroke-width="3"/>
  <text x="235" y="446" text-anchor="middle" class="label med">Current Context</text>
  <text x="235" y="483" text-anchor="middle" class="label med">and Operations</text>

  <!-- Central challenge gate -->
  <rect x="510" y="110" width="580" height="390" rx="16" fill="#f3f7f1" stroke="#27432a" stroke-width="3.5"/>
  <text x="800" y="165" text-anchor="middle" class="label med" fill="#243b27">Review Board Challenge</text>
  <line x1="555" y1="195" x2="1045" y2="195" stroke="#809280" stroke-width="2.5"/>
  <text x="800" y="244" text-anchor="middle" class="label small">Does current evidence still support</text>
  <text x="800" y="278" text-anchor="middle" class="label small">the continuing trust claim?</text>

  <rect x="560" y="320" width="155" height="95" rx="10" fill="#ffffff" stroke="#405449" stroke-width="2.5"/>
  <text x="637.5" y="356" text-anchor="middle" class="label tiny">Freshness</text>
  <text x="637.5" y="388" text-anchor="middle" class="label tiny">Check</text>

  <rect x="722.5" y="320" width="155" height="95" rx="10" fill="#ffffff" stroke="#405449" stroke-width="2.5"/>
  <text x="800" y="356" text-anchor="middle" class="label tiny">Owner</text>
  <text x="800" y="388" text-anchor="middle" class="label tiny">Check</text>

  <rect x="885" y="320" width="155" height="95" rx="10" fill="#ffffff" stroke="#405449" stroke-width="2.5"/>
  <text x="962.5" y="356" text-anchor="middle" class="label tiny">Risk</text>
  <text x="962.5" y="388" text-anchor="middle" class="label tiny">Challenge</text>

  <text x="800" y="462" text-anchor="middle" class="label small">No rubber stamp: challenge before renewal</text>

  <!-- Right outputs -->
  <rect x="1210" y="80" width="330" height="120" rx="12" fill="#f4f7fb" stroke="#1e3b63" stroke-width="3"/>
  <text x="1375" y="123" text-anchor="middle" class="label med" fill="#17345a">Decision</text>
  <text x="1375" y="158" text-anchor="middle" class="label tiny">Continue • Constrain</text>
  <text x="1375" y="187" text-anchor="middle" class="label tiny">Expand • Retire</text>

  <rect x="1210" y="240" width="330" height="120" rx="12" fill="#f4f7fb" stroke="#1e3b63" stroke-width="3"/>
  <text x="1375" y="286" text-anchor="middle" class="label med" fill="#17345a">Conditions</text>
  <text x="1375" y="323" text-anchor="middle" class="label small">Owners • Due Dates</text>

  <rect x="1210" y="400" width="330" height="120" rx="12" fill="#f4f7fb" stroke="#1e3b63" stroke-width="3"/>
  <text x="1375" y="444" text-anchor="middle" class="label med" fill="#17345a">Next Review</text>
  <text x="1375" y="479" text-anchor="middle" class="label tiny">Trigger</text>
  <text x="1375" y="508" text-anchor="middle" class="label tiny">Evidence Update</text>

  <!-- repository record at bottom -->
  <rect x="380" y="630" width="840" height="130" rx="14" fill="#fbfaf5" stroke="#5f5a49" stroke-width="3"/>
  <text x="800" y="675" text-anchor="middle" class="label med">Stewardship Review Record</text>
  <text x="800" y="713" text-anchor="middle" class="label small">claim • evidence • challenge • decision • owner</text>
  <text x="800" y="745" text-anchor="middle" class="label tiny">condition • next review • unresolved risk</text>

  <!-- arrows from inputs to gate -->
  <path d="M 400 140 L 510 140" class="line" marker-end="url(#arrow)"/>
  <path d="M 400 300 L 510 300" class="line" marker-end="url(#arrow)"/>
  <path d="M 400 460 L 510 460" class="line" marker-end="url(#arrow)"/>

  <!-- gate to outputs -->
  <path d="M 1090 140 L 1210 140" class="line" marker-end="url(#arrow)"/>
  <path d="M 1090 300 L 1210 300" class="line" marker-end="url(#arrow)"/>
  <path d="M 1090 460 L 1210 460" class="line" marker-end="url(#arrow)"/>

  <!-- gate and outputs to record -->
  <path d="M 800 500 L 800 630" class="line" marker-end="url(#arrow)"/>
  <path d="M 1375 520 L 1375 695 L 1220 695" class="line" marker-end="url(#arrow)"/>
  <path d="M 380 695 L 235 695 L 235 520" class="dash" marker-end="url(#arrowMuted)"/>
  <rect x="95" y="610" width="260" height="64" rx="8" fill="#ffffff"/>
  <text x="225" y="635" text-anchor="middle" class="label tiny" fill="#4d5663">updated evidence</text>
  <text x="225" y="664" text-anchor="middle" class="label tiny" fill="#4d5663">informs next review</text>
</svg>