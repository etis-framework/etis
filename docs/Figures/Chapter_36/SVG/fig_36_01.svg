<path d="M 965 261 L 900 350" fill="none" stroke="#677684" stroke-width="3.2" marker-end="url(#arrow)"/>
<path d="M 1150 229 L 1060 405" fill="none" stroke="#677684" stroke-width="3.2" marker-end="url(#arrow)"/>
<path d="M 1150 441 L 1060 470" fill="none" stroke="#677684" stroke-width="3.2" marker-end="url(#arrow)"/>
<path d="M 1150 653 L 1060 535" fill="none" stroke="#677684" stroke-width="3.2" marker-end="url(#arrow)"/>
<rect x="320" y="795" width="960" height="125" rx="12" fill="#f7f7f4" stroke="#2f3b45" stroke-width="3"/>
<text x="800" y="840" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f2933" text-anchor="middle">Oversight Risk</text>
<text x="800" y="872" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#53606b" text-anchor="middle">Formal authority degrades when evidence is not navigable under pressure.</text>
<path d="M 800 590 L 800 795" fill="none" stroke="#677684" stroke-width="3.2" marker-end="url(#arrow)"/>
</svg>