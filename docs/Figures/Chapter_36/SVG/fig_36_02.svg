<text x="800" y="856" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" text-anchor="middle" fill="#111111">Governed Outcome</text>
<text x="800" y="888" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" text-anchor="middle" fill="#111111">Responsible humans can form an accurate enough mental model to decide, challenge, escalate, or intervene.</text>
<rect x="285" y="925" width="1030" height="36" rx="8" fill="#ffffff" stroke="#535f6b" stroke-width="1.6"/>
<text x="800" y="949" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#111111">Understandability is not simplicity; necessary complexity must be visible, navigable, bounded, and role-appropriate.</text>
