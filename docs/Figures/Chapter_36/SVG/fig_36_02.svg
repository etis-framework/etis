<text x="800" y="88" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" text-anchor="middle" fill="#111111">Understandability is engineered access to meaning</text>
<text x="800" y="118" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" text-anchor="middle" fill="#111111">Each role needs the evidence, authority, uncertainty, and action options required for its decisions.</text>
<text x="235" y="180" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111111">Evidence and Context Inputs</text>
<text x="1345" y="180" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111111">Accountable Roles</text>
