<text x="800.0" y="354" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="middle" fill="#111111">operations, security, release, maintenance,</text>
<text x="800.0" y="376" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="middle" fill="#111111">review board</text>
