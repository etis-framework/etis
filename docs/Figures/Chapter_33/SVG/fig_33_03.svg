<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
<rect width="1600" height="900" fill="white"/><rect x="30" y="22" width="1540" height="840" rx="8" fill="white" stroke="#163A63" stroke-width="2.2"/><rect x="570.0" y="52" width="460" height="100" rx="7" fill="#F7FAFE" stroke="#1F4E79" stroke-width="2"/>
<text x="800" y="84" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="800" fill="#1F4E79">
<tspan x="800" dy="0">Proposed Action</tspan>
</text>
<text x="800" y="118" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="19" font-weight="500" fill="#111827">
<tspan x="800" dy="0">agent prepares a workflow action</tspan>
</text><line x1="800" y1="152" x2="800.0" y2="165.0" stroke="#1F4E79" stroke-width="4" stroke-linecap="round"/><polygon points="791.0,165.0 809.0,165.0 800,180" fill="#1F4E79"/><rect x="570.0" y="180" width="460" height="100" rx="7" fill="#F7FAFE" stroke="#1F4E79" stroke-width="2"/>
<text x="800" y="212" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="800" fill="#1F4E79">
<tspan x="800" dy="0">Evidence Display</tspan>
</text>
<text x="800" y="246" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="19" font-weight="500" fill="#111827">
<tspan x="800" dy="0">context, source, uncertainty, impact</tspan>
</text><line x1="800" y1="280" x2="800.0" y2="295.0" stroke="#1F4E79" stroke-width="4" stroke-linecap="round"/><polygon points="791.0,295.0 809.0,295.0 800,310" fill="#1F4E79"/><rect x="520.0" y="310" width="560" height="128" rx="8" fill="#FFFDF7" stroke="#9A6500" stroke-width="2.2"/><text x="800" y="349" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="31" font-weight="800" fill="#7A4B00">
<tspan x="800" dy="0">Human Review</tspan>
</text><text x="800" y="392" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="600" fill="#111827">
<tspan x="800" dy="0">approval must be evidence-backed,</tspan>
<tspan x="800" dy="25">attributable, and rejectable</tspan>
</text><line x1="675" y1="438" x2="514.1" y2="495.0" stroke="#1F4E79" stroke-width="4" stroke-linecap="round"/><polygon points="511.1,486.5 517.1,503.5 500,500" fill="#1F4E79"/><line x1="925" y1="438" x2="1085.9" y2="495.0" stroke="#1F4E79" stroke-width="4" stroke-linecap="round"/><polygon points="1082.9,503.5 1088.9,486.5 1100,500" fill="#1F4E79"/><rect x="310.0" y="500" width="380" height="100" rx="7" fill="#FFF8F8" stroke="#8A3A3A" stroke-width="2"/>
<text x="500" y="532" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="800" fill="#8A3A3A">
<tspan x="500" dy="0">Rejected</tspan>
</text>
<text x="500" y="566" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="19" font-weight="500" fill="#111827">
<tspan x="500" dy="0">human handling or revision</tspan>
</text><rect x="910.0" y="500" width="380" height="100" rx="7" fill="#F7FBF7" stroke="#2F5F3A" stroke-width="2"/>
<text x="1100" y="532" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="800" fill="#2F5F3A">
<tspan x="1100" dy="0">Approved</tspan>
</text>
<text x="1100" y="566" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="19" font-weight="500" fill="#111827">
<tspan x="1100" dy="0">execute the approved action</tspan>
