<text x="1110" y="701" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="500" fill="#111827">
<tspan x="1110" dy="0">decision and action record</tspan>
</text><line x1="972.5" y1="674.0" x2="952.5" y2="674.0" stroke="#1F4E79" stroke-width="4" stroke-linecap="round"/><polygon points="952.5,665.0 952.5,683.0 937.5,674.0" fill="#1F4E79"/><line x1="662.5" y1="674.0" x2="642.5" y2="674.0" stroke="#1F4E79" stroke-width="4" stroke-linecap="round"/><polygon points="642.5,665.0 642.5,683.0 627.5,674.0" fill="#1F4E79"/><line x1="490" y1="713" x2="490.0" y2="723.0" stroke="#1F4E79" stroke-width="4" stroke-linecap="round"/><polygon points="481.0,723.0 499.0,723.0 490,738" fill="#1F4E79"/><rect x="275.0" y="738" width="430" height="70" rx="6" fill="#FFF8F8" stroke="#8A3A3A" stroke-width="2"/><text x="490" y="767" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="21" font-weight="800" fill="#8A3A3A">
<tspan x="490" dy="0">Rollback / Compensation</tspan>
</text><text x="490" y="793" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="21" font-weight="800" fill="#8A3A3A">
<tspan x="490" dy="0">Revocation</tspan>
</text><line x1="705.0" y1="773.0" x2="735.0" y2="773.0" stroke="#1F4E79" stroke-width="4" stroke-linecap="round"/><polygon points="735.0,782.0 735.0,764.0 750.0,773.0" fill="#1F4E79"/><rect x="750.0" y="738" width="360" height="70" rx="6" fill="#FAFAFE" stroke="#4B3B73" stroke-width="2"/><text x="930" y="781" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="800" fill="#4B3B73">
<tspan x="930" dy="0">Review Required</tspan>
</text><rect x="70" y="822" width="1460" height="30" rx="5" fill="#F7FAFE" stroke="#163A63" stroke-width="2"/><text x="800" y="843" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="800" fill="#163A63">
<tspan x="800" dy="0">Approval must remain meaningful, attributable, reviewable, and recoverable.</tspan>
</text>
</svg>