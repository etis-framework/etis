<text x="800" y="667" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="800" fill="#1F4E79">
<tspan x="800" dy="0">Monitoring</tspan>
</text>
<text x="800" y="701" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="500" fill="#111827">
<tspan x="800" dy="0">signals and exceptions</tspan>
</text><rect x="972.5" y="635" width="275" height="78" rx="7" fill="#FAFAFE" stroke="#4B3B73" stroke-width="2"/>
<text x="1110" y="667" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="800" fill="#4B3B73">
<tspan x="1110" dy="0">Audit Logging</tspan>
