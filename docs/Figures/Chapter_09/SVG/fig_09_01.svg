<svg xmlns="http://www.w3.org/2000/svg" width="2500" height="1800" viewBox="0 0 2500 1800">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#667085"/>
  </marker>
</defs>
<rect x="0" y="0" width="2500" height="1800" fill="#ffffff"/>

<rect x="790" y="570" width="920" height="420" rx="28" fill="#f8fafc" stroke="#17324d" stroke-width="4"/>
<text x="1250.0" y="662" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:41px;font-weight:700;fill:#17324d;">
<tspan x="1250.0" dy="0">Repository as Engineering Memory</tspan>
</text>
<line x1="885" y1="702" x2="1615" y2="702" stroke="#94a3b8" stroke-width="3"/>
<text x="1250.0" y="790" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:37px;font-weight:700;fill:#172033;">
<tspan x="1250.0" dy="0">A system of evidence,</tspan>
<tspan x="1250.0" dy="42.699999999999996px">not a container of files</tspan>
</text>
<text x="1250.0" y="915" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:33px;font-weight:700;fill:#334155;">
<tspan x="1250.0" dy="0">Preserves purpose, decisions,</tspan>
<tspan x="1250.0" dy="37.82px">review, risk, AI use, and learning</tspan>
</text>
<rect x="90" y="130" width="610" height="330" rx="22" fill="#f4f8fd" stroke="#1e3a5f" stroke-width="3"/>
<rect x="114" y="154" width="562" height="78" rx="14" fill="#f8fafc" stroke="#1e3a5f" stroke-width="2"/>
<text x="395.0" y="204" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:33px;font-weight:700;fill:#1e3a5f;">
<tspan x="395.0" dy="0">Purpose and Need</tspan>
</text>
<circle cx="148" cy="270" r="6.5" fill="#1e3a5f"/>
<text x="180" y="280" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="180" dy="0">Stakeholder need</tspan>
</text>
<circle cx="148" cy="324" r="6.5" fill="#1e3a5f"/>
<text x="180" y="334" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="180" dy="0">Requirements</tspan>
</text>
<circle cx="148" cy="378" r="6.5" fill="#1e3a5f"/>
<text x="180" y="388" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="180" dy="0">Scope rationale</tspan>
</text>
<rect x="945" y="90" width="610" height="385" rx="22" fill="#f7f6fb" stroke="#473b71" stroke-width="3"/>
<rect x="969" y="114" width="562" height="78" rx="14" fill="#f8fafc" stroke="#473b71" stroke-width="2"/>
<text x="1250.0" y="164" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:33px;font-weight:700;fill:#473b71;">
<tspan x="1250.0" dy="0">Decision Memory</tspan>
</text>
<circle cx="1003" cy="230" r="6.5" fill="#473b71"/>
<text x="1035" y="240" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1035" dy="0">Design rationale</tspan>
</text>
<circle cx="1003" cy="284" r="6.5" fill="#473b71"/>
<text x="1035" y="294" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1035" dy="0">Rejected alternatives</tspan>
</text>
<circle cx="1003" cy="338" r="6.5" fill="#473b71"/>
<text x="1035" y="348" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1035" dy="0">ADRs / decisions</tspan>
</text>
<rect x="1800" y="130" width="610" height="385" rx="22" fill="#f5faf7" stroke="#2e5b46" stroke-width="3"/>
<rect x="1824" y="154" width="562" height="78" rx="14" fill="#f8fafc" stroke="#2e5b46" stroke-width="2"/>
<text x="2105.0" y="204" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:33px;font-weight:700;fill:#2e5b46;">
<tspan x="2105.0" dy="0">Work Evidence</tspan>
</text>
<circle cx="1858" cy="270" r="6.5" fill="#2e5b46"/>
<text x="1890" y="280" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1890" dy="0">Issues</tspan>
</text>
<circle cx="1858" cy="324" r="6.5" fill="#2e5b46"/>
<text x="1890" y="334" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1890" dy="0">Branches</tspan>
</text>
<circle cx="1858" cy="378" r="6.5" fill="#2e5b46"/>
<text x="1890" y="388" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1890" dy="0">Pull requests</tspan>
</text>
<circle cx="1858" cy="432" r="6.5" fill="#2e5b46"/>
<text x="1890" y="442" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1890" dy="0">Commits</tspan>
</text>
<rect x="90" y="1060" width="610" height="385" rx="22" fill="#f7f8fa" stroke="#3f4a5a" stroke-width="3"/>
<rect x="114" y="1084" width="562" height="78" rx="14" fill="#f8fafc" stroke="#3f4a5a" stroke-width="2"/>
<text x="395.0" y="1134" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:33px;font-weight:700;fill:#3f4a5a;">
<tspan x="395.0" dy="0">Verification and Review</tspan>
</text>
<circle cx="148" cy="1200" r="6.5" fill="#3f4a5a"/>
<text x="180" y="1210" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="180" dy="0">Tests</tspan>
</text>
<circle cx="148" cy="1254" r="6.5" fill="#3f4a5a"/>
<text x="180" y="1264" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="180" dy="0">Review comments</tspan>
</text>
<circle cx="148" cy="1308" r="6.5" fill="#3f4a5a"/>
<text x="180" y="1318" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="180" dy="0">Acceptance evidence</tspan>
</text>
<rect x="945" y="1080" width="610" height="385" rx="22" fill="#fbfaf2" stroke="#66521f" stroke-width="3"/>
<rect x="969" y="1104" width="562" height="78" rx="14" fill="#f8fafc" stroke="#66521f" stroke-width="2"/>
<text x="1250.0" y="1154" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:33px;font-weight:700;fill:#66521f;">
<tspan x="1250.0" dy="0">AI and Governance</tspan>
</text>
<circle cx="1003" cy="1220" r="6.5" fill="#66521f"/>
<text x="1035" y="1230" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1035" dy="0">AI-use records</tspan>
</text>
<circle cx="1003" cy="1274" r="6.5" fill="#66521f"/>
<text x="1035" y="1284" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1035" dy="0">Verification notes</tspan>
</text>
<circle cx="1003" cy="1328" r="6.5" fill="#66521f"/>
<text x="1035" y="1338" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1035" dy="0">Risk / limitation records</tspan>
</text>
<rect x="1800" y="1060" width="610" height="385" rx="22" fill="#fff7f7" stroke="#7a3e3e" stroke-width="3"/>
<rect x="1824" y="1084" width="562" height="78" rx="14" fill="#f8fafc" stroke="#7a3e3e" stroke-width="2"/>
<text x="2105.0" y="1134" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:33px;font-weight:700;fill:#7a3e3e;">
<tspan x="2105.0" dy="0">Operational Learning</tspan>
</text>
<circle cx="1858" cy="1200" r="6.5" fill="#7a3e3e"/>
<text x="1890" y="1210" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1890" dy="0">Release notes</tspan>
</text>
<circle cx="1858" cy="1254" r="6.5" fill="#7a3e3e"/>
<text x="1890" y="1264" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1890" dy="0">Incident evidence</tspan>
</text>
<circle cx="1858" cy="1308" r="6.5" fill="#7a3e3e"/>
<text x="1890" y="1318" text-anchor="start" style="font-family:Arial, Helvetica, sans-serif;font-size:30px;font-weight:600;fill:#172033;">
<tspan x="1890" dy="0">Postmortems</tspan>
</text>
<line x1="700" y1="330" x2="790" y2="570" stroke="#667085" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1250" y1="475" x2="1250" y2="570" stroke="#667085" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1800" y1="330" x2="1710" y2="570" stroke="#667085" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="700" y1="1250" x2="790" y2="990" stroke="#667085" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1250" y1="1080" x2="1250" y2="990" stroke="#667085" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="1800" y1="1250" x2="1710" y2="990" stroke="#667085" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="210" y="1510" width="2080" height="110" rx="18" fill="#f8fafc" stroke="#17324d" stroke-width="3"/>
<text x="1250.0" y="1553" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:32px;font-weight:700;fill:#172033;">
<tspan x="1250.0" dy="0">Others can reconstruct what was built, why it was built, and who reviewed it.</tspan>
</text>
<text x="1250.0" y="1592" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:32px;font-weight:700;fill:#172033;">
<tspan x="1250.0" dy="0">They can also inspect supporting evidence, AI use, and remaining risk.</tspan>
</text>
<rect x="270" y="1650" width="1960" height="115" rx="18" fill="#fffdf7" stroke="#17324d" stroke-width="3"/>
<text x="600" y="1720" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:31px;font-weight:700;fill:#17324d;">
<tspan x="600" dy="0">GOVERNING PRINCIPLE:</tspan>
</text>
<line x1="860" y1="1678" x2="860" y2="1740" stroke="#667085" stroke-width="3"/>
<text x="1560" y="1720" text-anchor="middle" style="font-family:Arial, Helvetica, sans-serif;font-size:33px;font-weight:700;fill:#172033;">
<tspan x="1560" dy="0">The repository is where trustworthy engineering becomes inspectable.</tspan>
</text>
</svg>