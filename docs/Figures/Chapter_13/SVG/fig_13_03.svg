<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 688">
<style>
.label{font-family:Arial,sans-serif;fill:#1f2933}
.top{fill:#eef3f7;stroke:#334e68;stroke-width:3}
.mid{fill:#ffffff;stroke:#52616b;stroke-width:2.2}
.risk{fill:#f4f7f9;stroke:#3f4a54;stroke-width:2.5}
.outcome{fill:#e8f1ec;stroke:#355e4b;stroke-width:2.8}
</style>
<defs>
<marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
<path d="M0 0 L14 7 L0 14 z" fill="#3f4a54"/>
</marker>
</defs>

<rect x="420" y="30" width="360" height="78" rx="14" ry="14" class="top"/>
<text x="600" y="80" text-anchor="middle" font-size="36" font-weight="700" class="label">Dependency</text>

<line x1="600" y1="108" x2="600" y2="165" stroke="#3f4a54" stroke-width="3.2" marker-end="url(#arrow)"/>

<rect x="20" y="190" width="210" height="78" rx="12" ry="12" class="mid"/>
<text x="125" y="240" text-anchor="middle" font-size="27" font-weight="700" class="label">Change Risk</text>

<rect x="250" y="190" width="210" height="78" rx="12" ry="12" class="mid"/>
<text x="355" y="240" text-anchor="middle" font-size="27" font-weight="700" class="label">Failure Risk</text>

<rect x="480" y="190" width="240" height="78" rx="12" ry="12" class="mid"/>
<text x="600" y="240" text-anchor="middle" font-size="27" font-weight="700" class="label">Ownership Risk</text>

<rect x="740" y="190" width="210" height="78" rx="12" ry="12" class="mid"/>
<text x="845" y="240" text-anchor="middle" font-size="27" font-weight="700" class="label">Testing Risk</text>

