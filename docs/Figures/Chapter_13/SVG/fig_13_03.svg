<line x1="600" y1="268" x2="600" y2="345" stroke="#3f4a54" stroke-width="3.2" marker-end="url(#arrow)"/>

<rect x="310" y="370" width="580" height="90" rx="14" ry="14" class="risk"/>
<text x="600" y="427" text-anchor="middle" font-size="36" font-weight="700" class="label">Risk Relationship</text>

<line x1="600" y1="460" x2="600" y2="545" stroke="#3f4a54" stroke-width="3.2" marker-end="url(#arrow)"/>

<rect x="320" y="580" width="560" height="88" rx="14" ry="14" class="outcome"/>
<text x="600" y="636" text-anchor="middle" font-size="34" font-weight="700" class="label">Reviewable Architecture</text>

