<text x="1470" y="650" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700">Control Functions</text>
<text x="1470" y="685" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700">Do Not Disappear</text>
<text x="1470" y="735" text-anchor="middle" font-family="Arial" font-size="21">Review, governance,</text>
<text x="1470" y="765" text-anchor="middle" font-family="Arial" font-size="21">evidence, and learning</text>

<!-- bottom principle, no connector -->
<rect x="420" y="955" width="1160" height="110" rx="14" fill="#f4f6f8" stroke="#56677d" stroke-width="2.5"/>
<text x="1000" y="1000" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Operational Learning Still Depends on</text>
<text x="1000" y="1035" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Review, Evidence, Governance, and Human Judgment</text>
