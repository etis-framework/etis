<text x="1000" y="764" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Evidence</text>

<rect x="770" y="850" width="460" height="70" rx="12" fill="#eef3f8" stroke="#3f5368" stroke-width="2.5"/>
