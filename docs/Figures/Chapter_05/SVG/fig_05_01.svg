<text x="1445" y="335" text-anchor="middle" font-family="Arial" font-size="21">More artifacts</text>
<text x="1445" y="365" text-anchor="middle" font-family="Arial" font-size="21">arrive sooner</text>

<rect x="770" y="590" width="460" height="70" rx="12" fill="#eef3f8" stroke="#3f5368" stroke-width="2.5"/>
<text x="1000" y="634" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Review</text>

