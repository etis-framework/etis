.label{font-family:Arial,sans-serif;font-size:24px;font-weight:700;fill:#1F2933;text-anchor:middle;dominant-baseline:middle}
.leftPanel{fill:#EEF4FA;stroke:#47657E;stroke-width:3}
.leftBox{fill:#FFFFFF;stroke:#47657E;stroke-width:2}
.rightPanel{fill:#EAF3F8;stroke:#2F536F;stroke-width:3}
