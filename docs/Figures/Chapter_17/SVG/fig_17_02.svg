<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1230" viewBox="0 0 1200 1230" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M2,2 L10,6 L2,10 Z" fill="#374151"/>
</marker>
<style>
.title{font-family:Arial,sans-serif;font-size:34px;font-weight:700;fill:#1F2933;text-anchor:middle}
.std{fill:#EEF4FA;stroke:#47657E;stroke-width:2.3}
.pr{fill:#DDEAF5;stroke:#2F536F;stroke-width:3}
.release{fill:#E8F2EC;stroke:#4E6F5D;stroke-width:2.4}
.label{font-family:Arial,sans-serif;font-size:26px;font-weight:700;fill:#1F2933;text-anchor:middle;dominant-baseline:middle}
.arrow{stroke:#374151;stroke-width:3.2;fill:none;marker-end:url(#arrow)}
</style>
</defs>

<text x="600" y="55" class="title">The Pull Request Evidence Chain</text>

<rect x="320" y="95" width="560" height="68" rx="16" class="std"/>
<text x="600" y="129" class="label">Issue Intent</text>
<path d="M600 163 L600 205" class="arrow"/>

<rect x="320" y="220" width="560" height="68" rx="16" class="std"/>
<text x="600" y="254" class="label">Branch</text>
<path d="M600 288 L600 330" class="arrow"/>

<rect x="320" y="345" width="560" height="68" rx="16" class="std"/>
<text x="600" y="379" class="label">Commits</text>
<path d="M600 413 L600 455" class="arrow"/>

<rect x="250" y="470" width="700" height="88" rx="18" class="pr"/>
<text x="600" y="514" class="label">Pull Request</text>
<path d="M600 558 L600 600" class="arrow"/>

<rect x="320" y="615" width="560" height="68" rx="16" class="std"/>
<text x="600" y="649" class="label">Tests</text>
<path d="M600 683 L600 725" class="arrow"/>

<rect x="320" y="740" width="560" height="68" rx="16" class="std"/>
<text x="600" y="774" class="label">CI/CD Evidence</text>
<path d="M600 808 L600 850" class="arrow"/>

<rect x="320" y="865" width="560" height="68" rx="16" class="std"/>
<text x="600" y="899" class="label">Review Comments</text>
<path d="M600 933 L600 975" class="arrow"/>

<rect x="320" y="990" width="560" height="68" rx="16" class="std"/>
<text x="600" y="1024" class="label">Merge Decision</text>

<!-- lengthened final connector -->
<path d="M600 1058 L600 1115" class="arrow"/>

<rect x="320" y="1135" width="560" height="68" rx="16" class="release"/>
<text x="600" y="1169" class="label">Release Evidence</text>

</svg>
