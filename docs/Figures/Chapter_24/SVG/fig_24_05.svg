<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
<defs>
 <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
  <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
 </marker>
 <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
  <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.10"/>
 </filter>
</defs>

<style>
.domain{fill:#f8fafc;stroke:#475569;stroke-width:2.2;}
.domain2{fill:#f5f7fb;stroke:#475569;stroke-width:2.2;}
.gate{fill:#eef4fb;stroke:#50657d;stroke-width:2.4;filter:url(#softShadow);}
.card{fill:#ffffff;stroke:#64748b;stroke-width:1.8;filter:url(#softShadow);}
.cardgreen{fill:#eef7f0;stroke:#4f7159;stroke-width:1.8;filter:url(#softShadow);}
.principle{fill:#f8fafc;stroke:#475569;stroke-width:1.8;}
.heading{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700;fill:#1e293b;}
.label{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:700;fill:#1e293b;}
.body{font-family:Arial,Helvetica,sans-serif;font-size:21px;fill:#334155;}
.gateText{font-family:Arial,Helvetica,sans-serif;font-size:22px;fill:#334155;}
.note{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-style:italic;font-weight:600;fill:#334155;}
.arrow{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow);}
</style>

<!-- Inputs -->
<rect x="45" y="46" width="330" height="540" class="domain"/>
<text x="210" y="88" text-anchor="middle" class="heading">Review Inputs</text>
<text x="210" y="118" text-anchor="middle" class="body">evidence brought to challenge</text>

<rect x="78" y="142" width="264" height="54" class="card"/>
<text x="210" y="176" text-anchor="middle" class="label">Defect Register</text>

<rect x="78" y="210" width="264" height="54" class="card"/>
<text x="210" y="244" text-anchor="middle" class="label">Defect Trends</text>

<rect x="78" y="278" width="264" height="54" class="card"/>
<text x="210" y="312" text-anchor="middle" class="label">Regression Evidence</text>

<rect x="78" y="346" width="264" height="54" class="card"/>
<text x="210" y="380" text-anchor="middle" class="label">Postmortem Findings</text>

<rect x="78" y="414" width="264" height="54" class="card"/>
<text x="210" y="448" text-anchor="middle" class="label">Known Limitations</text>

<rect x="78" y="482" width="264" height="54" class="card"/>
<text x="210" y="516" text-anchor="middle" class="label">AI Learning Notes</text>

<!-- Gate -->
<path d="M430 108 L760 108 L810 316 L760 524 L430 524 Z" class="gate"/>
<text x="612" y="172" text-anchor="middle" class="heading">Stabilization</text>
<text x="612" y="205" text-anchor="middle" class="heading">Review Gate</text>

<text x="612" y="266" text-anchor="middle" class="gateText">Recurring patterns visible?</text>
<text x="612" y="306" text-anchor="middle" class="gateText">Fixes verified by evidence?</text>
<text x="612" y="346" text-anchor="middle" class="gateText">Residual risks explicit?</text>
<text x="612" y="386" text-anchor="middle" class="gateText">Known limitations updated?</text>
<text x="612" y="426" text-anchor="middle" class="gateText">System becoming less fragile?</text>

<!-- Outputs -->
<rect x="855" y="46" width="330" height="540" class="domain2"/>
<text x="1020" y="88" text-anchor="middle" class="heading">Review Outputs</text>
<text x="1020" y="118" text-anchor="middle" class="body">stabilization converted to action</text>

<rect x="888" y="152" width="264" height="58" class="cardgreen"/>
<text x="1020" y="188" text-anchor="middle" class="label">Stabilization Plan</text>

<rect x="888" y="230" width="264" height="58" class="cardgreen"/>
<text x="1020" y="266" text-anchor="middle" class="label">Risk Burn-Down</text>

<rect x="888" y="308" width="264" height="58" class="cardgreen"/>
<text x="1020" y="344" text-anchor="middle" class="label">Regression Priorities</text>

<rect x="888" y="386" width="264" height="58" class="cardgreen"/>
<text x="1020" y="422" text-anchor="middle" class="label">Remaining Signal Gaps</text>

<rect x="888" y="464" width="264" height="58" class="cardgreen"/>
<text x="1020" y="486" text-anchor="middle" class="label">Observability</text>
<text x="1020" y="512" text-anchor="middle" class="label">Questions</text>

<!-- Flow arrows -->
<path d="M375 316 L420 316" class="arrow"/>
<path d="M810 316 L845 316" class="arrow"/>

<rect x="110" y="622" width="980" height="58" class="principle"/>
<text x="600" y="646" text-anchor="middle" class="note">Stabilization is not proven by closed defects;</text>
<text x="600" y="672" text-anchor="middle" class="note">it is proven by reduced fragility supported by evidence.</text>
</svg>