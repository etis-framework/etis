<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
<defs>
 <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
  <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
 </marker>
 <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
  <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.10"/>
 </filter>
</defs>

<style>
.domain{fill:#f8fafc;stroke:#475569;stroke-width:2.2;}
.domain2{fill:#f5f7fb;stroke:#475569;stroke-width:2.2;}
.principle{fill:#f8fafc;stroke:#475569;stroke-width:1.8;}
.cardBlue{fill:#eef4fb;stroke:#50657d;stroke-width:1.8;filter:url(#softShadow);}
.cardAmber{fill:#fff7ed;stroke:#9a6b2f;stroke-width:1.8;filter:url(#softShadow);}
.cardGreen{fill:#eef7f0;stroke:#4f7159;stroke-width:1.8;filter:url(#softShadow);}
.heading{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700;fill:#1e293b;}
.label{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:700;fill:#1e293b;}
.body{font-family:Arial,Helvetica,sans-serif;font-size:21px;fill:#334155;}
.note{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-style:italic;font-weight:600;fill:#334155;}
.arrow{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow);}
</style>

<rect x="70" y="42" width="1060" height="548" class="domain"/>
<text x="600" y="82" text-anchor="middle" class="heading">Repository evidence makes stabilization reconstructable</text>

<rect x="105" y="125" width="220" height="78" class="cardBlue"/>
<text x="215" y="157" text-anchor="middle" class="label">Defect Record</text>
<text x="215" y="185" text-anchor="middle" class="body">violated expectation</text>

<rect x="370" y="125" width="220" height="78" class="cardBlue"/>
<text x="480" y="157" text-anchor="middle" class="label">Linked Issue</text>
<text x="480" y="185" text-anchor="middle" class="body">owned work item</text>

<rect x="635" y="125" width="220" height="78" class="cardAmber"/>
<text x="745" y="157" text-anchor="middle" class="label">Fix PR</text>
<text x="745" y="185" text-anchor="middle" class="body">reviewable change</text>

<rect x="900" y="125" width="220" height="78" class="cardAmber"/>
<text x="1010" y="157" text-anchor="middle" class="label">Review Comments</text>
<text x="1010" y="185" text-anchor="middle" class="body">challenge and fit</text>

<path d="M325 164 L370 164" class="arrow"/>
<path d="M590 164 L635 164" class="arrow"/>
<path d="M855 164 L900 164" class="arrow"/>

<path d="M1010 203 L1010 267" class="arrow"/>

<rect x="900" y="275" width="220" height="86" class="cardGreen"/>
<text x="1010" y="306" text-anchor="middle" class="label">Regression Test</text>
<text x="1010" y="334" text-anchor="middle" class="body">protects behavior</text>

<rect x="635" y="275" width="220" height="86" class="cardGreen"/>
<text x="745" y="306" text-anchor="middle" class="label">CI Evidence</text>
<text x="745" y="334" text-anchor="middle" class="body">repeatable proof</text>

<rect x="370" y="275" width="220" height="86" class="cardGreen"/>
<text x="480" y="303" text-anchor="middle" class="label">Known Limitation</text>
<text x="480" y="329" text-anchor="middle" class="label">Update</text>

<rect x="105" y="275" width="220" height="86" class="cardGreen"/>
<text x="215" y="306" text-anchor="middle" class="label">Stabilization</text>
<text x="215" y="332" text-anchor="middle" class="label">Review</text>

<path d="M900 318 L855 318" class="arrow"/>
<path d="M635 318 L590 318" class="arrow"/>
<path d="M370 318 L325 318" class="arrow"/>

<rect x="175" y="438" width="850" height="86" class="domain2"/>
<text x="600" y="474" text-anchor="middle" class="label">Evidence Chain Outcome</text>
<text x="600" y="504" text-anchor="middle" class="body">A future reviewer can trace discovery, correction, verification, residual risk, and review.</text>

<rect x="110" y="622" width="980" height="58" class="principle"/>
<text x="600" y="658" text-anchor="middle" class="note">The repository stabilizes the system only when evidence guides decisions.</text>
</svg>