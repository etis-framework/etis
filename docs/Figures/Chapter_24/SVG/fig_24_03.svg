<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
<defs>
 <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
  <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
 </marker>
 <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
  <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.10"/>
 </filter>
</defs>

<style>
.domain{fill:#f8fafc;stroke:#475569;stroke-width:2.2;}
.domain2{fill:#f5f7fb;stroke:#475569;stroke-width:2.2;}
.domain3{fill:#f3f6fb;stroke:#475569;stroke-width:2.2;}
.principle{fill:#f8fafc;stroke:#475569;stroke-width:1.8;}
.cardBlue{fill:#eef4fb;stroke:#50657d;stroke-width:1.8;filter:url(#softShadow);}
.cardAmber{fill:#fff7ed;stroke:#9a6b2f;stroke-width:1.8;filter:url(#softShadow);}
.cardGreen{fill:#eef7f0;stroke:#4f7159;stroke-width:1.8;filter:url(#softShadow);}
.heading{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700;fill:#1e293b;}
.label{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-weight:700;fill:#1e293b;}
.label2{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:700;fill:#1e293b;}
.body{font-family:Arial,Helvetica,sans-serif;font-size:21px;fill:#334155;}
.note{font-family:Arial,Helvetica,sans-serif;font-size:23px;font-style:italic;font-weight:600;fill:#334155;}
.arrow{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow);}
</style>

<rect x="80" y="38" width="1040" height="180" class="domain"/>
<text x="600" y="78" text-anchor="middle" class="heading">Observed Defect Clusters</text>

<rect x="105" y="110" width="150" height="62" class="cardBlue"/>
<text x="180" y="136" text-anchor="middle" class="label2">Routing</text>
<text x="180" y="160" text-anchor="middle" class="label2">Delays</text>

<rect x="275" y="110" width="150" height="62" class="cardBlue"/>
<text x="350" y="136" text-anchor="middle" class="label2">Queue</text>
<text x="350" y="160" text-anchor="middle" class="label2">Visibility</text>

<rect x="445" y="110" width="150" height="62" class="cardBlue"/>
<text x="520" y="136" text-anchor="middle" class="label2">AI</text>
<text x="520" y="160" text-anchor="middle" class="label2">Summaries</text>

<rect x="615" y="110" width="150" height="62" class="cardBlue"/>
<text x="690" y="148" text-anchor="middle" class="label2">Notifications</text>

<rect x="785" y="110" width="150" height="62" class="cardBlue"/>
<text x="860" y="148" text-anchor="middle" class="label2">Ownership</text>

<rect x="955" y="110" width="150" height="62" class="cardBlue"/>
<text x="1030" y="148" text-anchor="middle" class="label2">Evidence</text>

<path d="M600 218 L600 258" class="arrow"/>

<rect x="80" y="258" width="1040" height="150" class="domain2"/>
<text x="600" y="298" text-anchor="middle" class="heading">Shared Instability Sources</text>

<rect x="105" y="322" width="300" height="70" class="cardAmber"/>
<text x="255" y="365" text-anchor="middle" class="label">Workflow Boundaries</text>

<rect x="450" y="322" width="300" height="70" class="cardAmber"/>
<text x="600" y="350" text-anchor="middle" class="label">Context and</text>
<text x="600" y="377" text-anchor="middle" class="label">Communication</text>

<rect x="795" y="322" width="300" height="70" class="cardAmber"/>
<text x="945" y="350" text-anchor="middle" class="label">Governance and</text>
<text x="945" y="377" text-anchor="middle" class="label">Observability</text>

<path d="M600 408 L600 448" class="arrow"/>

<rect x="80" y="448" width="1040" height="150" class="domain3"/>
<text x="600" y="488" text-anchor="middle" class="heading">Primary Stabilization Targets</text>

<rect x="105" y="512" width="300" height="70" class="cardGreen"/>
<text x="255" y="555" text-anchor="middle" class="label">Routing and Handoffs</text>

<rect x="450" y="512" width="300" height="70" class="cardGreen"/>
<text x="600" y="555" text-anchor="middle" class="label">AI Review Guidance</text>

<rect x="780" y="512" width="315" height="70" class="cardGreen"/>
<text x="945" y="540" text-anchor="middle" class="label">Operational Evidence</text>
<text x="945" y="567" text-anchor="middle" class="label">Coverage</text>

<rect x="110" y="622" width="980" height="58" class="principle"/>
<text x="600" y="648" text-anchor="middle" class="note">Stabilization improves fastest when recurring defects are traced</text><text x="600" y="672" text-anchor="middle" class="note">to shared sources of instability.</text>
</svg>