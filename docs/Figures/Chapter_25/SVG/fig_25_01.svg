<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Stabilization outputs create operational questions that require runtime evidence for reviewable understanding.">
<rect x="0" y="0" width="1600" height="1000" fill="#f7f9fb"/>
<defs>
  <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
</defs>
<rect x="110" y="70" width="1380" height="190" rx="20" fill="#e8eef5" stroke="#334155" stroke-width="2.4"/><text x="800.0" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#475569">INHERITED STABILIZATION OUTPUTS</text><text x="800.0" y="154" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="500" fill="#111827"><tspan x="800.0" dy="0">Defect patterns  •  Regression findings  •  Known limitations</tspan><tspan x="800.0" dy="44">Recurring delays  •  Handoff issues  •  AI-summary concerns</tspan></text><line x1="800.0" y1="272" x2="800.0" y2="286" stroke="#475569" stroke-width="4" stroke-linecap="round"/><polygon points="800.0,300 790.0,284 810.0,284" fill="#475569"/><text x="800.0" y="326" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#475569">QUESTIONS STABILIZATION CANNOT ANSWER BY ITSELF</text><rect x="110.0" y="360" width="256.8" height="170" rx="18" fill="#fff4df" stroke="#334155" stroke-width="2.2"/><text x="238.4" y="415" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#111827"><tspan x="238.4" dy="0">Where did</tspan><tspan x="238.4" dy="34">the delay occur?</tspan></text><rect x="390.8" y="360" width="256.8" height="170" rx="18" fill="#fff4df" stroke="#334155" stroke-width="2.2"/><text x="519.2" y="415" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#111827"><tspan x="519.2" dy="0">What context</tspan><tspan x="519.2" dy="34">influenced</tspan><tspan x="519.2" dy="34">AI output?</tspan></text><rect x="671.6" y="360" width="256.8" height="170" rx="18" fill="#fff4df" stroke="#334155" stroke-width="2.2"/><text x="800.0" y="415" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#111827"><tspan x="800.0" dy="0">Who approved</tspan><tspan x="800.0" dy="34">the</tspan><tspan x="800.0" dy="34">decision?</tspan></text><rect x="952.4000000000001" y="360" width="256.8" height="170" rx="18" fill="#fff4df" stroke="#334155" stroke-width="2.2"/><text x="1080.8000000000002" y="415" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#111827"><tspan x="1080.8000000000002" dy="0">What handoff</tspan><tspan x="1080.8000000000002" dy="34">slowed</tspan><tspan x="1080.8000000000002" dy="34">down?</tspan></text><rect x="1233.2" y="360" width="256.8" height="170" rx="18" fill="#fff4df" stroke="#334155" stroke-width="2.2"/><text x="1361.6000000000001" y="415" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#111827"><tspan x="1361.6000000000001" dy="0">Did a defect</tspan><tspan x="1361.6000000000001" dy="34">recur?</tspan></text><line x1="800.0" y1="548" x2="800.0" y2="592" stroke="#475569" stroke-width="4" stroke-linecap="round"/><polygon points="800.0,606 790.0,590 810.0,590" fill="#475569"/><rect x="110" y="630" width="1380" height="175" rx="20" fill="#e7f0f7" stroke="#334155" stroke-width="2.4"/><text x="800.0" y="668" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#475569">RUNTIME EVIDENCE</text><text x="800.0" y="714" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="500" fill="#111827"><tspan x="800.0" dy="0">Logs  •  Metrics  •  Traces  •  Audit Events  •  Correlation IDs</tspan><tspan x="800.0" dy="44">Evidence that reconstructs behavior, diagnoses failure, and supports review</tspan></text><line x1="800.0" y1="823" x2="800.0" y2="850" stroke="#475569" stroke-width="4" stroke-linecap="round"/><polygon points="800.0,864 790.0,848 810.0,848" fill="#475569"/><rect x="110" y="875" width="1380" height="85" rx="18" fill="#eef2f7" stroke="#334155" stroke-width="2.4"/><text x="800.0" y="904" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#111827"><tspan x="800.0" dy="0">A system becomes observable when runtime evidence can answer</tspan><tspan x="800.0" dy="32">meaningful operational questions.</tspan></text><line x1="110" y1="964" x2="1490" y2="964" stroke="#cbd5e1" stroke-width="2"/></svg>