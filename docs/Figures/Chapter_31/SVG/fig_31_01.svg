<text x="900.5" y="464" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18.8" font-weight="700" fill="#27343b"><tspan x="900.5" dy="0">What conditions apply?</tspan></text>
<line x1="479" y1="382.5" x2="556" y2="382.5" stroke="#596a73" stroke-width="2.8" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="1130" y="150" width="425" height="465" rx="22" fill="#f8fbf9" stroke="#5f8a72" stroke-width="2"/>
<text x="1342.5" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#27343b"><tspan x="1342.5" dy="0">Governed Decision Options</tspan></text>
<rect x="1160" y="232" width="365" height="155" rx="16" fill="#ffffff" stroke="#b4c8bb" stroke-width="1.6"/>
<text x="1342.5" y="264" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20.5" font-weight="700" fill="#27343b"><tspan x="1342.5" dy="0">Release Scope</tspan></text>
<text x="1342.5" y="300" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19.2" font-weight="400" fill="#53636c"><tspan x="1342.5" dy="0">Approve • Conditional approve • Defer</tspan></text>
<text x="1342.5" y="333" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19.2" font-weight="400" fill="#53636c"><tspan x="1342.5" dy="0">Roll back • Constrain scope • Expand later</tspan></text>
<rect x="1160" y="408" width="365" height="155" rx="16" fill="#ffffff" stroke="#b4c8bb" stroke-width="1.6"/>
<text x="1342.5" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20.5" font-weight="700" fill="#27343b"><tspan x="1342.5" dy="0">AI Capability State</tspan></text>
<text x="1342.5" y="476" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19.2" font-weight="400" fill="#53636c"><tspan x="1342.5" dy="0">Re-enable • Narrow • Monitor</tspan></text>
<text x="1342.5" y="509" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19.2" font-weight="400" fill="#53636c"><tspan x="1342.5" dy="0">Revoke • Prohibit • Defer</tspan></text>
<line x1="1044" y1="382.5" x2="1121" y2="382.5" stroke="#596a73" stroke-width="2.8" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="105" y="690" width="1390" height="86" rx="18" fill="#ffffff" stroke="#c7d0d5" stroke-width="1.8"/>
<text x="800.0" y="724" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#27343b"><tspan x="800.0" dy="0">Release authority is not permission to ship; it is accountability for changing operational risk.</tspan></text>
<text x="800.0" y="748" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19.5" font-weight="400" fill="#53636c"><tspan x="800.0" dy="0">Every decision requires evidence, conditions, owners, rollback or fallback expectations, and communication</tspan><tspan x="800.0" dy="23">obligations.</tspan></text>
