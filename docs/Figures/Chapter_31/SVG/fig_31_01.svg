<text x="260.0" y="256" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19.5" font-weight="700" fill="#27343b"><tspan x="260.0" dy="0">Incident Record</tspan></text>
<text x="260.0" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19.5" font-weight="400" fill="#53636c"><tspan x="260.0" dy="0">facts, severity, roles</tspan></text>
