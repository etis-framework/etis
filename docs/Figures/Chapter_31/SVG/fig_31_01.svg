<text x="800.0" y="46" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#27343b"><tspan x="800.0" dy="0">From Incident Evidence to Release Authority</tspan></text>
<text x="800.0" y="84" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#53636c"><tspan x="800.0" dy="0">Containment produces evidence. Release governance converts evidence into accountable</tspan><tspan x="800.0" dy="26">authority.</tspan></text>
