<text x="260.0" y="568" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19.5" font-weight="400" fill="#53636c"><tspan x="260.0" dy="0">AI state and security boundaries</tspan></text>
<rect x="565" y="235" width="470" height="300" rx="24" fill="#fffaf0" stroke="#b88f2c" stroke-width="2.4"/>
<text x="800.0" y="279" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#27343b"><tspan x="800.0" dy="0">Release Authority Decision</tspan></text>
<text x="800.0" y="317" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#53636c"><tspan x="800.0" dy="0">Evidence informs the decision; accountable humans</tspan><tspan x="800.0" dy="25">authorize operational risk change.</tspan></text>
