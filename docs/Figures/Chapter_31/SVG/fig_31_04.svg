<text x="800" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#27343b">Operational Release Governance Review Gate</text>
<text x="800" y="76" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#53636c">Review converts release evidence into accountable authority, conditions, owners, and transparency inputs.</text>
