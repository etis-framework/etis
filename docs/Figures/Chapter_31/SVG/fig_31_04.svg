<text x="800.0" y="434" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" fill="#53636c">Challenges whether evidence justifies changing exposure, authority, capability, or risk.</text>
<rect x="350" y="472" width="215" height="58" rx="14" fill="#ffffff" stroke="#c7d0d5" stroke-width="1.5"/>
