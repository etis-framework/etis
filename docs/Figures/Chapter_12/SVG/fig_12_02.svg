<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
<style>
.label{font-family:Arial,sans-serif;fill:#1f2933}
.boundary{fill:#eef3f7;stroke:#334e68;stroke-width:3}
.inside{fill:#fff;stroke:#52616b;stroke-width:2.2}
.outside{fill:#f6f1e8;stroke:#7a6a47;stroke-width:2.2}
.evidence{fill:#f4f7f9;stroke:#3f4a54;stroke-width:2.5}
.outcome{fill:#e8f1ec;stroke:#355e4b;stroke-width:2.8}
</style>

<defs>
<marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
<path d="M0 0 L14 7 L0 14 z" fill="#3f4a54"/>
</marker>
</defs>

<rect x="80" y="70" width="720" height="360" rx="18" ry="18" class="boundary"/>
<text x="440" y="122" font-size="38" font-weight="700" text-anchor="middle" class="label">Trust Boundary</text>

<rect x="135" y="160" width="190" height="72" rx="12" ry="12" class="inside"/>
<text x="230" y="205" font-size="27" font-weight="700" text-anchor="middle" class="label">Intake</text>

<rect x="355" y="160" width="190" height="72" rx="12" ry="12" class="inside"/>
<text x="450" y="205" font-size="27" font-weight="700" text-anchor="middle" class="label">Routing</text>

<rect x="575" y="160" width="170" height="72" rx="12" ry="12" class="inside"/>
<text x="660" y="205" font-size="27" font-weight="700" text-anchor="middle" class="label">Review</text>

<rect x="185" y="285" width="230" height="72" rx="12" ry="12" class="inside"/>
<text x="300" y="330" font-size="27" font-weight="700" text-anchor="middle" class="label">Notifications</text>

<rect x="465" y="285" width="230" height="72" rx="12" ry="12" class="inside"/>
<text x="580" y="330" font-size="27" font-weight="700" text-anchor="middle" class="label">Audit Records</text>

<rect x="845" y="115" width="295" height="270" rx="12" ry="12" class="outside"/>
<text x="992" y="158" font-size="31" font-weight="700" text-anchor="middle" class="label">Deferred Work</text>
<text x="992" y="220" font-size="25" text-anchor="middle" class="label">AI Classification</text>
<text x="992" y="265" font-size="25" text-anchor="middle" class="label">AI Escalation</text>
<text x="992" y="310" font-size="25" text-anchor="middle" class="label">Advanced Reports</text>
<text x="992" y="355" font-size="25" text-anchor="middle" class="label">Large Dashboards</text>

<line x1="440" y1="430" x2="440" y2="490" stroke="#3f4a54" stroke-width="3.2" marker-end="url(#arrow)"/>
<rect x="175" y="515" width="530" height="115" rx="14" ry="14" class="evidence"/>
<text x="440" y="557" font-size="32" font-weight="700" text-anchor="middle" class="label">Defensible Claims</text>
<text x="440" y="605" font-size="26" text-anchor="middle" class="label">Reviewed • Tested • Governed • Auditable</text>

<line x1="440" y1="630" x2="440" y2="690" stroke="#3f4a54" stroke-width="3.2" marker-end="url(#arrow)"/>
<rect x="235" y="710" width="410" height="72" rx="14" ry="14" class="outcome"/>
<text x="440" y="756" font-size="31" font-weight="700" text-anchor="middle" class="label">Trustworthy Pilot Scope</text>
</svg>