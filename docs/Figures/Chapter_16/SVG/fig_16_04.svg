<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1210" viewBox="0 0 1200 1210" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M2,2 L10,6 L2,10 Z" fill="#374151"/>
</marker>
<style>
.title{font-family:Arial,sans-serif;font-size:34px;font-weight:700;fill:#1F2933;text-anchor:middle}
.label{font-family:Arial,sans-serif;font-size:28px;font-weight:700;fill:#1F2933;text-anchor:middle;dominant-baseline:middle}
.small{font-family:Arial,sans-serif;font-size:24px;font-weight:700;fill:#1F2933;text-anchor:middle;dominant-baseline:middle}
.main{fill:#EEF1F4;stroke:#5C6873;stroke-width:2.4}
.evidence{fill:#F4F8FC;stroke:#47657E;stroke-width:3}
.inner{fill:#FFFFFF;stroke:#47657E;stroke-width:2}
.repo{fill:#EFEAF5;stroke:#67577B;stroke-width:2.4}
.final{fill:#E8F2EC;stroke:#4E6F5D;stroke-width:2.4}
.arrow{stroke:#374151;stroke-width:3.2;fill:none;marker-end:url(#arrow)}
</style>
</defs>

<text x="600" y="55" class="title">Consequential AI Assistance Must Leave Evidence</text>

<rect x="290" y="95" width="620" height="82" rx="18" class="main"/>
<text x="600" y="136" class="label">Consequential AI Assistance</text>

<path d="M600 177 L600 218" class="arrow"/>

<!-- Extended parent container so all inner boxes have visible bottom clearance -->
<rect x="180" y="230" width="840" height="485" rx="24" class="evidence"/>
<text x="600" y="275" class="label">Implementation Evidence</text>

<rect x="270" y="310" width="660" height="52" rx="12" class="inner"/>
<text x="600" y="336" class="small">Requirements / ADRs</text>

<rect x="270" y="390" width="660" height="52" rx="12" class="inner"/>
<text x="600" y="416" class="small">Engineer Verification</text>

<rect x="270" y="470" width="660" height="52" rx="12" class="inner"/>
<text x="600" y="496" class="small">Tests Updated</text>

<rect x="270" y="550" width="660" height="52" rx="12" class="inner"/>
<text x="600" y="576" class="small">Review Evidence</text>

<rect x="270" y="630" width="660" height="52" rx="12" class="inner"/>
<text x="600" y="656" class="small">Known Limitations</text>

<!-- Arrow begins at parent container bottom border, stops before next box -->
<path d="M600 715 L600 760" class="arrow"/>

<rect x="290" y="775" width="620" height="82" rx="18" class="repo"/>
<text x="600" y="816" class="label">AI-Use Log Entry</text>

<path d="M600 857 L600 910" class="arrow"/>

<rect x="290" y="925" width="620" height="82" rx="18" class="repo"/>
<text x="600" y="958" class="small">Repository Evidence</text>
<text x="600" y="985" class="small">/docs/ai/ai-use-log.md</text>

<path d="M600 1007 L600 1060" class="arrow"/>

<rect x="260" y="1075" width="680" height="82" rx="18" class="final"/>
<text x="600" y="1116" class="label">Reviewable Engineering Record</text>

</svg>
