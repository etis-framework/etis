<rect x="210" y="1240" width="2780" height="300" class="principle"/>
<text x="1600" y="1325" text-anchor="middle" class="title">GOVERNING PRINCIPLE</text>
<text x="1600" y="1410" text-anchor="middle" class="body">The Professional Move Is Not To Build Faster.</text>
<text x="1600" y="1475" text-anchor="middle" class="body">It Is To Expose Assumptions Before They Become Architecture.</text>
