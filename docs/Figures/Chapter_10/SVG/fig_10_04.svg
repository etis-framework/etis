
<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1700" viewBox="0 0 3200 1560">
<style>
text { font-family: Arial, Helvetica, sans-serif; fill:#222; }
.band { fill:#eef3f8; stroke:#444; stroke-width:3.5; }
.box { fill:white; stroke:#444; stroke-width:3.5; }
.riskbox { fill:#fff8ef; stroke:#555; stroke-width:3.5; }
.principle { fill:#f7f7f7; stroke:#444; stroke-width:3.5; }
.hdr { font-size:60px; font-weight:bold; }
.title { font-size:46px; font-weight:bold; }
.body { font-size:40px; }
.smallbody { font-size:37px; }
</style>

<rect x="180" y="45" width="2840" height="120" class="band"/>
<text x="1600" y="125" text-anchor="middle" class="hdr">Hidden Assumptions Rarely Stay Hidden</text>

<!-- Main propagation chain: larger boxes, same font scale, split long phrases -->
<rect x="90" y="300" width="420" height="340" class="riskbox"/>
