<text x="1100" y="1290" text-anchor="middle" class="body">Problem • Stakeholders • Requirements • Assumptions • Constraints • Reviews • Decisions • Risk</text>

<rect x="180" y="1360" width="1840" height="120" class="principle"/>
<text x="1100" y="1415" text-anchor="middle" class="title">GOVERNING PRINCIPLE</text>
<text x="1100" y="1460" text-anchor="middle" class="body">A Requirement That Cannot Be Traced Is Fragile. A Decision That Cannot Be Reconstructed Is Risky.</text>
