
<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1500" viewBox="0 0 2200 1500">
<style>
text { font-family: Arial, Helvetica, sans-serif; fill:#222; }
.box { fill:white; stroke:#444; stroke-width:3; }
