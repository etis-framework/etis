<tspan x="645.0" dy="27">authority</tspan>
</text>
<rect x="795" y="688" width="250" height="82" rx="12" fill="#ffffff" stroke="#5f6b7a" stroke-width="1.6"/>
<text x="920.0" y="720" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#23303d" text-anchor="middle">
