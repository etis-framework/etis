<tspan x="1195.0" dy="27">runbook</tspan>
</text>
<rect x="1345" y="688" width="250" height="82" rx="12" fill="#ffffff" stroke="#5f6b7a" stroke-width="1.6"/>
<text x="1470.0" y="720" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#23303d" text-anchor="middle">
<tspan x="1470.0" dy="0">Human</tspan>
<tspan x="1470.0" dy="27">operation</tspan>
</text>
<text x="850.0" y="817" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#23303d" text-anchor="middle">
<tspan x="850.0" dy="0">Delegated authority remains under control only when it can be stopped, limited, corrected, or replaced.</tspan>
</text>
<rect x="180" y="895" width="1340" height="88" rx="18" fill="#dbe5ef" stroke="#5f6b7a" stroke-width="1.8"/>
<text x="850.0" y="949" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#23303d" text-anchor="middle">
<tspan x="850.0" dy="0">Never delegate authority you cannot revoke.</tspan>
</text>
</svg>