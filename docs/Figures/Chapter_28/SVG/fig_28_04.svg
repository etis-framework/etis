
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050">
<rect width="100%" height="100%" fill="white"/>

<!-- Left evidence region -->
<rect x="70" y="120" width="420" height="720" rx="20" fill="#f3f6f9" stroke="#5f6b7a" stroke-width="2"/>
<text x="280" y="175" text-anchor="middle" font-family="Arial" font-size="32" font-weight="700">Evidence Inputs</text>

<rect x="120" y="220" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="280" y="258" text-anchor="middle" font-family="Arial" font-size="24">Delegation Policy</text>

<rect x="120" y="305" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="280" y="343" text-anchor="middle" font-family="Arial" font-size="24">Delegation Matrix</text>

<rect x="120" y="390" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="280" y="428" text-anchor="middle" font-family="Arial" font-size="24">Approval Paths</text>

<rect x="120" y="475" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="280" y="513" text-anchor="middle" font-family="Arial" font-size="24">Context Inventory</text>

<rect x="120" y="560" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="280" y="598" text-anchor="middle" font-family="Arial" font-size="24">Audit Evidence</text>

<rect x="120" y="645" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="280" y="683" text-anchor="middle" font-family="Arial" font-size="24">Monitoring Plan</text>

<rect x="120" y="730" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="280" y="768" text-anchor="middle" font-family="Arial" font-size="24">Revocation Plan</text>

<!-- Center review gate -->
<rect x="620" y="180" width="560" height="600" rx="24" fill="#dbe5ef" stroke="#5f6b7a" stroke-width="3"/>
<text x="900" y="245" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700">
AI Delegation Governance Review
</text>

<text x="900" y="330" text-anchor="middle" font-family="Arial" font-size="24">Authority?</text>
<text x="900" y="390" text-anchor="middle" font-family="Arial" font-size="24">Approval?</text>
<text x="900" y="450" text-anchor="middle" font-family="Arial" font-size="24">Context?</text>
<text x="900" y="510" text-anchor="middle" font-family="Arial" font-size="24">Tool Access?</text>
<text x="900" y="570" text-anchor="middle" font-family="Arial" font-size="24">Auditability?</text>
<text x="900" y="630" text-anchor="middle" font-family="Arial" font-size="24">Rollback &amp; Revocation?</text>
<text x="900" y="690" text-anchor="middle" font-family="Arial" font-size="24">Ownership &amp; Risk?</text>

<!-- arrows into gate -->
<line x1="490" y1="480" x2="600" y2="480" stroke="#5f6b7a" stroke-width="4"/>
<polygon points="600,480 585,472 585,488" fill="#5f6b7a"/>

<!-- outputs -->
<rect x="1310" y="120" width="420" height="720" rx="20" fill="#f3f6f9" stroke="#5f6b7a" stroke-width="2"/>
<text x="1520" y="175" text-anchor="middle" font-family="Arial" font-size="32" font-weight="700">Governance Outputs</text>

<rect x="1360" y="220" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="1520" y="258" text-anchor="middle" font-family="Arial" font-size="24">Approved Delegation</text>

<rect x="1360" y="305" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="1520" y="343" text-anchor="middle" font-family="Arial" font-size="24">Prohibited Actions</text>

<rect x="1360" y="390" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="1520" y="428" text-anchor="middle" font-family="Arial" font-size="24">Monitoring Obligations</text>

<rect x="1360" y="475" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="1520" y="513" text-anchor="middle" font-family="Arial" font-size="24">Owner Assignments</text>

<rect x="1360" y="560" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="1520" y="598" text-anchor="middle" font-family="Arial" font-size="24">Residual Risk</text>

<rect x="1360" y="645" width="320" height="60" rx="10" fill="white" stroke="#5f6b7a"/>
<text x="1520" y="683" text-anchor="middle" font-family="Arial" font-size="24">Reliability Handoff</text>

<line x1="1200" y1="480" x2="1310" y2="480" stroke="#5f6b7a" stroke-width="4"/>
<polygon points="1310,480 1295,472 1295,488" fill="#5f6b7a"/>

<!-- takeaway -->
<rect x="180" y="900" width="1440" height="80" rx="16" fill="#dbe5ef" stroke="#5f6b7a"/>
<text x="900" y="950" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700">
AI delegation is accepted only when evidence makes the authority decision defensible.
</text>

</svg>
