
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="780" viewBox="0 0 1600 780">
<style>
.pageTitle{font-family:Arial;font-size:42px;font-weight:bold;}
.pageSub{font-family:Arial;font-size:27px;}
.frameTitle{font-family:Arial;font-size:26px;font-weight:bold;}
.boxTitle{font-family:Arial;font-size:29px;font-weight:bold;}
.boxTitleSmall{font-family:Arial;font-size:25px;font-weight:bold;}
.boxText{font-family:Arial;font-size:24px;}
.outer{fill:white;stroke:#9aa8b4;stroke-width:2.2;}
.center{fill:#e8f1fb;stroke:#2f5678;stroke-width:3.2;}
.domain{fill:#eef4fb;stroke:#3f637d;stroke-width:2.4;}
.outcome{fill:#f5f0e6;stroke:#8a6d3b;stroke-width:2.3;}
.principle{fill:#eef1f8;stroke:#52637c;stroke-width:2.3;}
</style>

<text x="800" y="54" text-anchor="middle" class="pageTitle">Engineering Release Defense Review Board</text>
<text x="800" y="94" text-anchor="middle" class="pageSub">A successful defense proves understanding, not perfection.</text>

<rect x="70" y="112" width="1460" height="610" rx="18" class="outer"/>

<rect x="360" y="145" width="880" height="104" rx="16" class="center"/>
<text x="800" y="184" text-anchor="middle" class="boxTitle">Review Challenge</text>
<text x="800" y="220" text-anchor="middle" class="boxText">scope • evidence • AI boundaries • risk ownership</text>

<rect x="130" y="285" width="420" height="146" rx="12" class="domain"/>
<text x="340" y="323" text-anchor="middle" class="boxTitleSmall">Release Claim</text>
<text x="340" y="360" text-anchor="middle" class="boxText">limited pilot</text>
<text x="340" y="389" text-anchor="middle" class="boxText">trained staff</text>
<text x="340" y="418" text-anchor="middle" class="boxText">advisory AI</text>

<rect x="590" y="285" width="420" height="146" rx="12" class="domain"/>
<text x="800" y="323" text-anchor="middle" class="boxTitleSmall">Evidence Response</text>
<text x="800" y="360" text-anchor="middle" class="boxText">evaluation summary</text>
<text x="800" y="389" text-anchor="middle" class="boxText">known limitations</text>
<text x="800" y="418" text-anchor="middle" class="boxText">risk disposition</text>

<rect x="1050" y="285" width="420" height="146" rx="12" class="domain"/>
<text x="1260" y="323" text-anchor="middle" class="boxTitleSmall">Follow-Up Ownership</text>
<text x="1260" y="360" text-anchor="middle" class="boxText">unresolved questions</text>
<text x="1260" y="389" text-anchor="middle" class="boxText">pilot owners</text>
<text x="1260" y="418" text-anchor="middle" class="boxText">next work</text>

<!-- tighter spacing -->
<rect x="180" y="470" width="1240" height="92" rx="14" class="outcome"/>
<text x="800" y="505" text-anchor="middle" class="frameTitle">Stakeholder Acceptance</text>
<text x="800" y="540" text-anchor="middle" class="boxText">not perfect • understood • bounded • owned</text>

<!-- pulled upward -->
<rect x="250" y="615" width="1100" height="46" rx="9" class="principle"/>
<text x="800" y="646" text-anchor="middle" class="boxText">A mature team responds with evidence, not defensiveness.</text>
</svg>
