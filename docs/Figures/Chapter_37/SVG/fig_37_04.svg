<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940">
<rect x="0" y="0" width="1600" height="940" fill="#ffffff"/>
<defs>
  <marker id="arrow" markerWidth="6" markerHeight="6" refX="5.6" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 6 3 L 0 6 z" fill="#202020"/>
  </marker>
  <marker id="arrowSmall" markerWidth="5.5" markerHeight="5.5" refX="5.1" refY="2.75" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 5.5 2.75 L 0 5.5 z" fill="#202020"/>
  </marker>
</defs>
<rect x="28" y="28" width="1544" height="884" rx="0" fill="#ffffff" stroke="#6a6a6a" stroke-width="1.5"/>
<rect x="140" y="60" width="1320" height="110" rx="8" fill="#f7f1dc" stroke="#202020" stroke-width="2"/>
<text x="800" y="92" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#111111" >Governed Repository Context Controls</text>
<text x="800" y="124" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" text-anchor="middle" fill="#111111" >Authority • Freshness • Permissions • Privacy • Evidence lineage • Review expectations</text>
<text x="800" y="151" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="middle" fill="#111111" >Controls decide what repository evidence AI may retrieve, combine, summarize, and expose.</text>
<rect x="80" y="245" width="430" height="360" rx="6" fill="#eef5fb" stroke="#202020" stroke-width="2"/>
<rect x="81" y="246" width="428" height="54" rx="5" fill="#dbeaf6" stroke="none"/>
<line x1="80" y1="300" x2="510" y2="300" stroke="#202020" stroke-width="1.5" stroke-linecap="round"/>
<text x="295.0" y="270" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" text-anchor="middle" fill="#111111" >Approved Repository Evidence</text>
<text x="295.0" y="297" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" text-anchor="middle" fill="#111111" >Source of governed context</text>
<text x="102" y="327" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Policies, runbooks, and release</text>
<text x="102" y="350" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >  limitations</text>
<text x="102" y="375" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Incident records and postmortems</text>
<text x="102" y="400" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Architecture decisions and review</text>
<text x="102" y="423" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >  records</text>
<text x="102" y="448" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Context registries and freshness</text>
<text x="102" y="471" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >  notes</text>
<text x="102" y="496" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• AI-use logs and oversight records</text>
<rect x="590" y="275" width="420" height="290" rx="6" fill="#eef2fa" stroke="#202020" stroke-width="2"/>
<rect x="591" y="276" width="418" height="54" rx="5" fill="#e2e8f7" stroke="none"/>
<line x1="590" y1="330" x2="1010" y2="330" stroke="#202020" stroke-width="1.5" stroke-linecap="round"/>
<text x="800.0" y="300" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" text-anchor="middle" fill="#111111" >Bounded AI Retrieval and Summarization</text>
<text x="800.0" y="327" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" text-anchor="middle" fill="#111111" >Consumer and proposer, not source of truth</text>
<text x="612" y="357" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Retrieves only approved sources</text>
<text x="612" y="382" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Preserves source links and</text>
<text x="612" y="405" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >  uncertainty</text>
<text x="612" y="430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Flags stale or conditional</text>
<text x="612" y="453" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >  evidence</text>
<text x="612" y="478" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Produces reviewer packet or</text>
<text x="612" y="501" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >  proposed summary</text>
<rect x="1090" y="245" width="430" height="360" rx="6" fill="#eef6ef" stroke="#202020" stroke-width="2"/>
<rect x="1091" y="246" width="428" height="54" rx="5" fill="#dfeee0" stroke="none"/>
<line x1="1090" y1="300" x2="1520" y2="300" stroke="#202020" stroke-width="1.5" stroke-linecap="round"/>
<text x="1305.0" y="270" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" text-anchor="middle" fill="#111111" >Human Review and Verification</text>
<text x="1305.0" y="297" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" text-anchor="middle" fill="#111111" >Accountable control before action</text>
<text x="1112" y="327" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Checks source authority and</text>
<text x="1112" y="350" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >  freshness</text>
<text x="1112" y="375" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Confirms permissions and privacy</text>
<text x="1112" y="398" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >  limits</text>
<text x="1112" y="423" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Challenges assumptions and</text>
<text x="1112" y="446" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >  omissions</text>
<text x="1112" y="471" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Accepts, edits, rejects, or</text>
<text x="1112" y="494" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >  escalates</text>
<text x="1112" y="519" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >• Records decision and follow-up</text>
<text x="1112" y="542" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >  evidence</text>
<line x1="510" y1="395" x2="582" y2="395" stroke="#202020" stroke-width="2.2" marker-end="url(#arrowSmall)" stroke-linecap="round"/>
<line x1="1010" y1="395" x2="1082" y2="395" stroke="#202020" stroke-width="2.2" marker-end="url(#arrowSmall)" stroke-linecap="round"/>
<line x1="800" y1="170" x2="800" y2="267" stroke="#202020" stroke-width="2.2" marker-end="url(#arrowSmall)" stroke-linecap="round"/>
<text x="825" y="215" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" text-anchor="start" fill="#111111" >context policy applies</text>
<rect x="180" y="705" width="1240" height="95" rx="8" fill="#f4f0f7" stroke="#202020" stroke-width="2"/>
<text x="800" y="738" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#111111" >Repository AI-Use and Review Evidence Record</text>
<text x="800" y="770" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="400" text-anchor="middle" fill="#111111" >What AI proposed • What humans changed • What was accepted or rejected • Which evidence verified the result</text>
<polyline points="800,565 800,635 800,697" fill="none" stroke="#202020" stroke-width="2.2" marker-end="url(#arrowSmall)" stroke-linejoin="round" stroke-linecap="round"/>
<text x="825" y="640" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" text-anchor="start" fill="#111111" >record outcome</text>
<line x1="1305" y1="605" x2="1305" y2="697" stroke="#202020" stroke-width="2.2" marker-end="url(#arrowSmall)" stroke-linecap="round"/>
<text x="1330" y="656" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" text-anchor="start" fill="#111111" >decision evidence</text>
<polyline points="180,752 105,752 105,625 295,625 295,611" fill="none" stroke="#202020" stroke-width="1.8" marker-end="url(#arrowSmall)" stroke-dasharray="7 7" stroke-linejoin="round" stroke-linecap="round"/>
<text x="128" y="678" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" text-anchor="start" fill="#111111" >stewardship refresh loop</text>
<rect x="255" y="835" width="1090" height="60" rx="6" fill="#fffaf0" stroke="#202020" stroke-width="2"/>
<text x="800" y="861" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" text-anchor="middle" fill="#111111" >AI output remains proposed interpretation until verified against governed repository evidence.</text>
<text x="800" y="886" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" text-anchor="middle" fill="#111111" >A weak repository becomes a weak context layer; a governed repository strengthens accountable AI use.</text>
<rect x="155" y="190" width="160" height="35" rx="5" fill="#ffffff" stroke="#555555" stroke-width="1.5"/>
<text x="235" y="213" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#111111" >Approved sources</text>
<rect x="345" y="190" width="160" height="35" rx="5" fill="#ffffff" stroke="#555555" stroke-width="1.5"/>
<text x="425" y="206" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#111111" >Current or</text>
<text x="425" y="222" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#111111" >conditional</text>
<rect x="1165" y="190" width="160" height="35" rx="5" fill="#ffffff" stroke="#555555" stroke-width="1.5"/>
<text x="1245" y="213" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#111111" >Human authority</text>
<rect x="1370" y="190" width="160" height="35" rx="5" fill="#ffffff" stroke="#555555" stroke-width="1.5"/>
<text x="1450" y="213" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#111111" >Reviewable action</text>
</svg>