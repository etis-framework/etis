<text x="500" y="564" text-anchor="middle" font-family="Arial" font-size="27" font-weight="700" fill="#111827">Audit Event</text>
<text x="1030" y="564" text-anchor="middle" font-family="Arial" font-size="24" fill="#111827">Record what happened and who acted</text>
<rect x="170" y="622" width="1260" height="64" rx="16" fill="#e8eef5" stroke="#334155" stroke-width="2.4"/>
<text x="500" y="662" text-anchor="middle" font-family="Arial" font-size="27" font-weight="700" fill="#111827">Review Record</text>
<text x="1030" y="662" text-anchor="middle" font-family="Arial" font-size="24" fill="#111827">Preserve evidence for future review</text>

