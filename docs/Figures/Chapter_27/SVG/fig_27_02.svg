<text x="500" y="466" text-anchor="middle" font-family="Arial" font-size="27" font-weight="700" fill="#111827">Approval Required?</text>
<text x="1030" y="466" text-anchor="middle" font-family="Arial" font-size="24" fill="#111827">Escalate when authority exceeds the role</text>
