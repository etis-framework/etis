<text x="500" y="368" text-anchor="middle" font-family="Arial" font-size="27" font-weight="700" fill="#111827">Permitted Action</text>
<text x="1030" y="368" text-anchor="middle" font-family="Arial" font-size="24" fill="#111827">View • Update • Approve • Escalate</text>
