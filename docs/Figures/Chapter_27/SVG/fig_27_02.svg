<text x="1030" y="172" text-anchor="middle" font-family="Arial" font-size="24" fill="#111827">Who has a legitimate purpose?</text>
<rect x="170" y="230" width="1260" height="64" rx="16" fill="#e8eef5" stroke="#334155" stroke-width="2.4"/>
<text x="500" y="270" text-anchor="middle" font-family="Arial" font-size="27" font-weight="700" fill="#111827">Minimum Data Needed</text>
<text x="1030" y="270" text-anchor="middle" font-family="Arial" font-size="24" fill="#111827">Only the information required for the task</text>
