<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="940" viewBox="0 0 1200 940">
<rect width="1200" height="940" fill="white"/>
<text x="600" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#475569">Testing maturity means matching the test level to the question.</text>
<rect x="70" y="85" width="1060" height="805" rx="22" fill="#ffffff" stroke="#94a3b8" stroke-width="2.2"/>
<rect x="120" y="120" width="960" height="92" rx="18" fill="#fbf8ff" stroke="#7b6897" stroke-width="2.8"/>
<text x="600" y="158" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#1f2933">Levels of Testing Answer Different Questions</text>
<text x="600" y="193" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="400" fill="#475569">No single level verifies the whole system.</text>
<rect x="120" y="245" width="960" height="58" rx="14" fill="#f8fbff" stroke="#5e7fa3" stroke-width="2.4"/>
<text x="270.0" y="283" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#1f2933">Testing Level</text>
<text x="750.0" y="283" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#1f2933">Question It Answers</text>
<rect x="120" y="303" width="960" height="82" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
<line x1="420" y1="303" x2="420" y2="385" stroke="#cbd5e1" stroke-width="1.8"/>
<text x="270.0" y="353" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#1f2933">Unit Testing</text>
<text x="750.0" y="339" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">Does this small piece</text>
<text x="750.0" y="369" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">of logic work?</text>
<rect x="120" y="385" width="960" height="82" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6"/>
<line x1="420" y1="385" x2="420" y2="467" stroke="#cbd5e1" stroke-width="1.8"/>
<text x="270.0" y="435" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#1f2933">Integration Testing</text>
<text x="750.0" y="421" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">Do the components</text>
<text x="750.0" y="451" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">work together?</text>
<rect x="120" y="467" width="960" height="82" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
<line x1="420" y1="467" x2="420" y2="549" stroke="#cbd5e1" stroke-width="1.8"/>
<text x="270.0" y="517" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#1f2933">System Testing</text>
<text x="750.0" y="503" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">Does the end-to-end</text>
<text x="750.0" y="533" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">workflow behave correctly?</text>
<rect x="120" y="549" width="960" height="82" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6"/>
<line x1="420" y1="549" x2="420" y2="631" stroke="#cbd5e1" stroke-width="1.8"/>
<text x="270.0" y="599" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#1f2933">Acceptance Testing</text>
<text x="750.0" y="585" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">Does it satisfy</text>
<text x="750.0" y="615" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">stakeholder expectations?</text>
<rect x="120" y="631" width="960" height="82" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
<line x1="420" y1="631" x2="420" y2="713" stroke="#cbd5e1" stroke-width="1.8"/>
<text x="270.0" y="681" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#1f2933">Regression Testing</text>
<text x="750.0" y="667" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">Did this change break</text>
<text x="750.0" y="697" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">previously accepted behavior?</text>
<rect x="120" y="713" width="960" height="82" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6"/>
<line x1="420" y1="713" x2="420" y2="795" stroke="#cbd5e1" stroke-width="1.8"/>
<text x="270.0" y="763" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#1f2933">Smoke Testing</text>
<text x="750.0" y="749" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">Is the system basically</text>
<text x="750.0" y="779" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">usable after build or deployment?</text>
<rect x="120" y="795" width="960" height="82" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
<line x1="420" y1="795" x2="420" y2="877" stroke="#cbd5e1" stroke-width="1.8"/>
<text x="270.0" y="845" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#1f2933">Exploratory &amp; Manual</text>
<text x="750.0" y="831" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">What does human</text>
<text x="750.0" y="861" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#1f2933">investigation reveal?</text>

</svg>