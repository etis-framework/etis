
<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1472" viewBox="0 0 2600 1472">
<rect width="100%" height="100%" fill="white"/>

<style>
.label{font-family:Arial,Helvetica,sans-serif;font-size:37px;font-weight:700;fill:#0B1F3A}
.assert{font-family:Arial,Helvetica,sans-serif;font-size:37px;font-weight:700;fill:#0B1F3A}
.note{font-family:Arial,Helvetica,sans-serif;font-size:37px;font-weight:700;fill:#7F1D1D}
</style>

<!-- subtle drift slope -->
<line x1="380" y1="300" x2="2200" y2="860" stroke="#CBD5E1" stroke-width="8"/>

<rect x="240" y="210" width="420" height="110" rx="18" fill="#EAF2FF" stroke="#1E3A8A" stroke-width="4"/>
<text x="450" y="278" text-anchor="middle" class="label">Recommendation</text>

<rect x="620" y="350" width="480" height="110" rx="18" fill="white" stroke="#64748B" stroke-width="4"/>
<text x="860" y="418" text-anchor="middle" class="label">Routine Acceptance</text>

<rect x="1060" y="500" width="420" height="110" rx="18" fill="white" stroke="#64748B" stroke-width="4"/>
<text x="1270" y="568" text-anchor="middle" class="label">Default Behavior</text>

<rect x="1500" y="650" width="460" height="110" rx="18" fill="#FFF7ED" stroke="#C2410C" stroke-width="4"/>
<text x="1730" y="718" text-anchor="middle" class="label">Implicit Authority</text>

<rect x="1940" y="800" width="420" height="110" rx="18" fill="#FEF2F2" stroke="#B91C1C" stroke-width="4"/>
<text x="2150" y="868" text-anchor="middle" class="label">Governance Drift</text>

<rect x="620" y="1080" width="1360" height="100" rx="18" fill="white" stroke="#0B1F3A" stroke-width="3"/>
<text x="1300" y="1143" text-anchor="middle" class="assert">Authority changes gradually. Oversight often lags behind.</text>

<rect x="560" y="1280" width="1480" height="95" rx="18" fill="#FEF2F2" stroke="#B91C1C" stroke-width="4"/>
<text x="1300" y="1338" text-anchor="middle" class="note">Delegation without boundaries becomes risk.</text>

</svg>
