
<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1600" viewBox="0 0 2600 1600">
<rect width="100%" height="100%" fill="white"/>

<style>
.center{font-family:Arial,Helvetica,sans-serif;font-size:40px;font-weight:700;fill:#0B1F3A}
.label{font-family:Arial,Helvetica,sans-serif;font-size:36px;font-weight:700;fill:#0B1F3A}
.assert{font-family:Arial,Helvetica,sans-serif;font-size:36px;font-weight:700;fill:#0B1F3A}
