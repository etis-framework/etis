
<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1600" viewBox="0 0 2600 1600">
<rect width="100%" height="100%" fill="white"/>

<style>
.axis{font-family:Arial,Helvetica,sans-serif;font-size:34px;font-weight:700;fill:#0B1F3A}
.label{font-family:Arial,Helvetica,sans-serif;font-size:36px;font-weight:700}
.note{font-family:Arial,Helvetica,sans-serif;font-size:34px;font-weight:700;fill:#7F1D1D}
.callout{font-family:Arial,Helvetica,sans-serif;font-size:34px;font-weight:700;fill:#7F1D1D}
</style>

<rect x="180" y="120" width="2200" height="1040" rx="24" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="3"/>

<line x1="340" y1="1010" x2="2240" y2="1010" stroke="#0B1F3A" stroke-width="5"/>
<line x1="340" y1="1010" x2="340" y2="220" stroke="#0B1F3A" stroke-width="5"/>

<text x="1290" y="1120" text-anchor="middle" class="axis">Time</text>
<text x="130" y="620" text-anchor="middle" transform="rotate(-90 130 620)" class="axis">Growth</text>

<path d="M390 930 C760 880,1100 740,1450 560 C1780 390,2000 270,2200 210"
 fill="none" stroke="#1E3A8A" stroke-width="10" stroke-linecap="round"/>

<path d="M390 960 C760 920,1100 850,1450 760 C1780 690,2000 650,2200 620"
 fill="none" stroke="#166534" stroke-width="10" stroke-linecap="round"/>

<text x="1985" y="180" class="label" fill="#1E3A8A">Activity</text>
<text x="1965" y="745" class="label" fill="#166534">Operational Trust</text>

<path d="M1300 635
         C1600 500,1850 390,2100 300
         L2100 590
         C1850 620,1600 670,1300 730 Z"
 fill="#FEF2F2" opacity="0.85" stroke="#B91C1C" stroke-width="3"/>

<!-- lowered further for clear whitespace from blue curve -->
<rect x="1500" y="560" width="500" height="90" rx="16" fill="white" stroke="#B91C1C" stroke-width="3"/>
<text x="1750" y="617" text-anchor="middle" class="callout">Illusion of Progress</text>

<rect x="640" y="1240" width="1300" height="100" rx="18" fill="white" stroke="#0B1F3A" stroke-width="3"/>
<text x="1290" y="1303" text-anchor="middle" class="axis">Motion Is Not Maturity</text>

<rect x="470" y="1420" width="1640" height="95" rx="18" fill="#FEF2F2" stroke="#B91C1C" stroke-width="4"/>
<text x="1290" y="1478" text-anchor="middle" class="note">Activity can increase faster than operational trust.</text>

</svg>
