
<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1600" viewBox="0 0 2600 1600">
<rect width="100%" height="100%" fill="white"/>
<style>
.axis{font-family:Arial,Helvetica,sans-serif;font-size:34px;font-weight:700;fill:#0B1F3A}
.label{font-family:Arial,Helvetica,sans-serif;font-size:36px;font-weight:700}
.note{font-family:Arial,Helvetica,sans-serif;font-size:34px;font-weight:700;fill:#7F1D1D}
</style>

<rect x="180" y="120" width="2200" height="1040" rx="24" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="3"/>
<line x1="340" y1="1010" x2="2240" y2="1010" stroke="#0B1F3A" stroke-width="5"/>
<line x1="340" y1="1010" x2="340" y2="220" stroke="#0B1F3A" stroke-width="5"/>

<text x="1290" y="1120" text-anchor="middle" class="axis">Time</text>
<text x="130" y="620" text-anchor="middle" transform="rotate(-90 130 620)" class="axis">Organizational Knowledge</text>

<path d="M390 280 C700 340,980 470,1250 650 C1550 830,1850 910,2200 950"
 fill="none" stroke="#92400E" stroke-width="10" stroke-linecap="round"/>

<path d="M390 720 C900 715,1400 705,2200 695"
 fill="none" stroke="#166534" stroke-width="10" stroke-linecap="round"/>

<text x="540" y="245" class="label" fill="#92400E">Institutional Memory</text>
<text x="1700" y="660" class="label" fill="#166534">Repository Evidence</text>

<circle cx="1350" cy="700" r="16" fill="#B91C1C"/>

<!-- moved farther up/right -->
<rect x="1590" y="505" width="360" height="80" rx="16" fill="white" stroke="#B91C1C" stroke-width="3"/>
<text x="1770" y="555" text-anchor="middle" class="note">Knowledge Gap</text>

<rect x="760" y="1240" width="1060" height="100" rx="18" fill="white" stroke="#0B1F3A" stroke-width="3"/>
<text x="1290" y="1303" text-anchor="middle" class="axis">Memory Fades. Evidence Persists.</text>

<rect x="470" y="1420" width="1640" height="95" rx="18" fill="#FEF2F2" stroke="#B91C1C" stroke-width="4"/>
<text x="1290" y="1478" text-anchor="middle" class="note">Repositories preserve inspectable history beyond individual memory.</text>
</svg>
