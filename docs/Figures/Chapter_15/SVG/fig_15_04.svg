<rect x="450" y="545" width="300" height="84" rx="12" ry="12" class="lower"/>
<text x="600" y="598" text-anchor="middle" font-size="25" font-weight="700" class="label">Risks Accepted</text>

<rect x="830" y="545" width="300" height="84" rx="12" ry="12" class="lower"/>
