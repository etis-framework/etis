<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="840" viewBox="0 0 1200 840">
<style>
.label{font-family:Arial,sans-serif;fill:#1f2933}
.top{fill:#eef3f7;stroke:#334e68;stroke-width:3}
.row{fill:#ffffff;stroke:#52616b;stroke-width:2.2}
.core{fill:#f4f7f9;stroke:#3f4a54;stroke-width:2.6}
.evidence{fill:#eef3f7;stroke:#334e68;stroke-width:2.4}
.bottom{fill:#e8f1ec;stroke:#355e4b;stroke-width:2.8}
</style>

<rect x="250" y="35" width="700" height="84" rx="14" ry="14" class="top"/>
<text x="600" y="89" text-anchor="middle" font-size="34" font-weight="700" class="label">Architecture Decision Record</text>

<rect x="40" y="190" width="260" height="82" rx="12" ry="12" class="row"/>
<text x="170" y="243" text-anchor="middle" font-size="30" font-weight="700" class="label">Issues</text>

<rect x="320" y="190" width="260" height="82" rx="12" ry="12" class="row"/>
<text x="450" y="243" text-anchor="middle" font-size="27" font-weight="700" class="label">Implementation</text>

<rect x="600" y="190" width="260" height="82" rx="12" ry="12" class="row"/>
<text x="730" y="243" text-anchor="middle" font-size="30" font-weight="700" class="label">Tests</text>

<rect x="880" y="190" width="280" height="82" rx="12" ry="12" class="row"/>
<text x="1020" y="243" text-anchor="middle" font-size="30" font-weight="700" class="label">Reviews</text>

<rect x="180" y="355" width="840" height="100" rx="14" ry="14" class="core"/>
<text x="600" y="417" text-anchor="middle" font-size="38" font-weight="700" class="label">Implementation Constraints</text>

<rect x="70" y="545" width="300" height="84" rx="12" ry="12" class="evidence"/>
