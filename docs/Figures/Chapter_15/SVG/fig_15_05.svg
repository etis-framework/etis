<rect x="450" y="545" width="300" height="84" rx="12" ry="12" class="evidence"/>
<text x="600" y="598" text-anchor="middle" font-size="24" font-weight="700" class="label">Compliance Evidence</text>

<rect x="830" y="545" width="300" height="84" rx="12" ry="12" class="evidence"/>
<text x="980" y="598" text-anchor="middle" font-size="25" font-weight="700" class="label">Release Evidence</text>

<rect x="320" y="710" width="560" height="86" rx="14" ry="14" class="bottom"/>
<text x="600" y="765" text-anchor="middle" font-size="34" font-weight="700" class="label">Governed Change</text>

</svg>
