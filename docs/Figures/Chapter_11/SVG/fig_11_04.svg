
<svg xmlns="http://www.w3.org/2000/svg" width="6200" height="3500" viewBox="0 0 6200 3500">
<style>
text { font-family: Arial, Helvetica, sans-serif; fill:#222; }
.band { fill:#eef3f8; stroke:#444; stroke-width:6; }
.box { fill:white; stroke:#444; stroke-width:6; }
.risk { fill:#fff8ef; stroke:#555; stroke-width:6; }
.problem { fill:#fff3f0; stroke:#555; stroke-width:7; }
.control { fill:#f8fbfd; stroke:#333; stroke-width:7; }
.principle { fill:#f7f7f7; stroke:#444; stroke-width:6; }
.hdr { font-size:132px; font-weight:bold; }
.title { font-size:104px; font-weight:bold; }
.body { font-size:98px; }
</style>

<!-- Observation band -->
<rect x="300" y="70" width="5600" height="245" class="band"/>
<text x="3100" y="230" text-anchor="middle" class="hdr">Polished Requirements Can Hide Weak Understanding</text>

<!-- Failure chain boxes -->
<rect x="120" y="560" width="1100" height="780" class="box"/>
<text x="670" y="735" text-anchor="middle" class="title">AI-Generated</text>
<text x="670" y="855" text-anchor="middle" class="title">Requirement</text>
<text x="670" y="1080" text-anchor="middle" class="body">Fluent</text>
<text x="670" y="1215" text-anchor="middle" class="body">Organized</text>
<text x="670" y="1315" text-anchor="middle" class="body">Convincing</text>

<rect x="1450" y="500" width="1300" height="900" class="problem"/>
<text x="2100" y="685" text-anchor="middle" class="title">Hidden</text>
<text x="2100" y="805" text-anchor="middle" class="title">Misunderstanding</text>
<text x="2100" y="1050" text-anchor="middle" class="body">Assumptions</text>
<text x="2100" y="1200" text-anchor="middle" class="body">Missing Constraints</text>
<text x="2100" y="1350" text-anchor="middle" class="body">Stakeholder Conflict</text>

<rect x="2980" y="560" width="1100" height="780" class="risk"/>
<text x="3530" y="735" text-anchor="middle" class="title">Accepted</text>
<text x="3530" y="855" text-anchor="middle" class="title">Too Quickly</text>
<text x="3530" y="1100" text-anchor="middle" class="body">Limited Review</text>
<text x="3530" y="1245" text-anchor="middle" class="body">Weak Validation</text>

<rect x="4310" y="560" width="1100" height="780" class="box"/>
<text x="4860" y="735" text-anchor="middle" class="title">Engineering</text>
<text x="4860" y="855" text-anchor="middle" class="title">Propagation</text>
<text x="4860" y="1055" text-anchor="middle" class="body">Planning</text>
<text x="4860" y="1175" text-anchor="middle" class="body">Architecture</text>
<text x="4860" y="1295" text-anchor="middle" class="body">Testing</text>

<rect x="2010" y="1540" width="2200" height="720" class="risk"/>
<text x="3110" y="1710" text-anchor="middle" class="title">Operational Consequences</text>
<text x="3110" y="1905" text-anchor="middle" class="body">Wrong Behavior</text>
<text x="3110" y="2055" text-anchor="middle" class="body">Wrong Evidence</text>
<text x="3110" y="2205" text-anchor="middle" class="body">Wrong Decisions</text>

<!-- Connectors -->
<line x1="1220" y1="950" x2="1450" y2="950" stroke="#555" stroke-width="8"/>
<polygon points="1450,950 1402,924 1402,976" fill="#555"/>
<line x1="2750" y1="950" x2="2980" y2="950" stroke="#555" stroke-width="8"/>
<polygon points="2980,950 2932,924 2932,976" fill="#555"/>
<line x1="4080" y1="950" x2="4310" y2="950" stroke="#555" stroke-width="8"/>
<polygon points="4310,950 4262,924 4262,976" fill="#555"/>
<line x1="4860" y1="1340" x2="3830" y2="1540" stroke="#555" stroke-width="8"/>
<polygon points="3830,1540 3885,1505 3890,1555" fill="#555"/>

<!-- Corrective practices -->
<rect x="320" y="2400" width="5560" height="600" class="control"/>
<text x="3100" y="2570" text-anchor="middle" class="title">Trustworthy Engineering Controls</text>
<text x="3100" y="2750" text-anchor="middle" class="body">Evidence Linking • Stakeholder Validation • Governance Review</text>
<text x="3100" y="2890" text-anchor="middle" class="body">AI Disclosure • Human Ownership</text>

<!-- Governing principle -->
<rect x="600" y="3160" width="5000" height="260" class="principle"/>
<text x="3100" y="3330" text-anchor="middle" class="hdr">The Goal Is Less Unearned Certainty</text>
</svg>
