
<svg xmlns="http://www.w3.org/2000/svg" width="5600" height="3600" viewBox="0 0 5600 3600">
<style>
text { font-family: Arial, Helvetica, sans-serif; fill:#222; }
.band { fill:#eef3f8; stroke:#444; stroke-width:6; }
.box { fill:white; stroke:#444; stroke-width:6; }
.ai { fill:#f5f1fb; stroke:#444; stroke-width:6; }
.review { fill:#f8fbfd; stroke:#333; stroke-width:7; }
.validate { fill:#f4f7f9; stroke:#444; stroke-width:6; }
.owner { fill:#f2f7f3; stroke:#333; stroke-width:7; }
.principle { fill:#f7f7f7; stroke:#444; stroke-width:6; }
.hdr { font-size:132px; font-weight:bold; }
.title { font-size:106px; font-weight:bold; }
.body { font-size:86px; }
</style>

<!-- Top observation -->
<rect x="260" y="70" width="5080" height="250" class="band"/>
<text x="2800" y="235" text-anchor="middle" class="hdr">Trustworthy Requirements Are Challenged Before They Are Accepted</text>

<!-- Main transformation row -->
<rect x="160" y="520" width="1500" height="1020" class="ai"/>
<text x="910" y="700" text-anchor="middle" class="title">AI-Generated</text>
<text x="910" y="825" text-anchor="middle" class="title">Requirement</text>
<text x="910" y="1070" text-anchor="middle" class="body">Candidate Requirement</text>
<text x="910" y="1235" text-anchor="middle" class="body">Candidate Criteria</text>
<text x="910" y="1400" text-anchor="middle" class="body">Candidate Classification</text>

<rect x="2030" y="460" width="1540" height="1140" class="review"/>
<text x="2800" y="650" text-anchor="middle" class="title">Human Verification</text>
<text x="2800" y="890" text-anchor="middle" class="body">Source Evidence Check</text>
<text x="2800" y="1060" text-anchor="middle" class="body">Assumption Check</text>
<text x="2800" y="1230" text-anchor="middle" class="body">Governance Check</text>
<text x="2800" y="1400" text-anchor="middle" class="body">Verification Check</text>

<rect x="3940" y="520" width="1500" height="1020" class="validate"/>
<text x="4690" y="700" text-anchor="middle" class="title">Stakeholder</text>
<text x="4690" y="825" text-anchor="middle" class="title">Validation</text>
<text x="4690" y="1070" text-anchor="middle" class="body">Operational Confirmation</text>
<text x="4690" y="1235" text-anchor="middle" class="body">Authority Confirmation</text>
<text x="4690" y="1400" text-anchor="middle" class="body">Privacy Confirmation</text>

<!-- Horizontal connectors -->
<line x1="1660" y1="1030" x2="2030" y2="1030" stroke="#555" stroke-width="8"/>
<polygon points="2030,1030 1982,1004 1982,1056" fill="#555"/>
<line x1="3570" y1="1030" x2="3940" y2="1030" stroke="#555" stroke-width="8"/>
<polygon points="3940,1030 3892,1004 3892,1056" fill="#555"/>

<!-- Final human-owned requirement -->
<rect x="560" y="1860" width="4480" height="680" class="owner"/>
<text x="2800" y="2035" text-anchor="middle" class="title">Human-Owned Requirement</text>
<text x="2800" y="2240" text-anchor="middle" class="body">Evidence Supported • Validated • Traceable</text>
<text x="2800" y="2400" text-anchor="middle" class="body">Accountable Human Owner</text>

<!-- Downward connectors to ownership -->
<line x1="910" y1="1540" x2="910" y2="1860" stroke="#555" stroke-width="7"/>
<line x1="2800" y1="1600" x2="2800" y2="1860" stroke="#555" stroke-width="7"/>
<line x1="4690" y1="1540" x2="4690" y2="1860" stroke="#555" stroke-width="7"/>

<!-- Governing principle -->
<rect x="420" y="2820" width="4760" height="620" class="principle"/>
<text x="2800" y="2980" text-anchor="middle" class="title">GOVERNING PRINCIPLE</text>
<text x="2800" y="3165" text-anchor="middle" class="body">AI Can Help Write The Sentence;</text>
<text x="2800" y="3315" text-anchor="middle" class="body">A Human Must Own The Claim</text>
</svg>
