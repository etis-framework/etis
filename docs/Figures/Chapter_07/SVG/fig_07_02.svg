<text x="900" y="355" text-anchor="middle" font-family="Arial" font-size="27" font-weight="600">Architecture • Governance • Operations</text>

<line x1="900" y1="390" x2="900" y2="455" stroke="#25313b" stroke-width="2.5" marker-end="url(#arrow)"/>

