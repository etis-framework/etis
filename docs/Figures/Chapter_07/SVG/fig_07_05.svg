<!-- Observation box -->
<rect x="430" y="990" width="1040" height="115" rx="10" fill="white" stroke="#9aa6b1" stroke-width="2"/>
<text x="950" y="1036" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#1f2933">Awareness is not ownership.</text>
<text x="950" y="1076" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#1f2933">Ownership must be visible.</text>

<!-- Governance principle -->
<rect x="410" y="1150" width="1080" height="135" rx="12" fill="white" stroke="#2d4052" stroke-width="2.5"/>
<text x="480" y="1193" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2d4052">GOVERNANCE PRINCIPLE</text>
<line x1="480" y1="1208" x2="1420" y2="1208" stroke="#9aa6b1"/>
<text x="950" y="1247" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="600" fill="#1f2933">Trustworthy teams make responsibility explicit before failure occurs.</text>

</svg>
