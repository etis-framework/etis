
<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1320" viewBox="0 0 1900 1320">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0,0 L12,6 L0,12 z" fill="#25313b"/>
  </marker>
</defs>
<rect width="1900" height="1320" fill="white"/>

<!-- Column headers -->
<text x="475" y="85" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#1f2933">Accountability Fog</text>
<text x="1425" y="85" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#1f2933">Explicit Ownership</text>

