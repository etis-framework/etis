<rect x="285" y="745" width="380" height="90" rx="10" fill="#fbf7e8" stroke="#4a5864" stroke-width="2"/>
<text x="475" y="799" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" fill="#1f2933">Release Surprise</text>

