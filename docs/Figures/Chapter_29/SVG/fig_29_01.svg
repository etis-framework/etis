<text x="995" y="412" text-anchor="middle" font-size="27" font-weight="700">Governance Controls</text>
<text x="995" y="455" text-anchor="middle" font-size="27" font-weight="700">Meet Reality</text>

<rect x="1260" y="120" width="450" height="560" rx="24" fill="#faf7f4" stroke="#5f6b7a" stroke-width="2.5"/>
<text x="1485" y="180" text-anchor="middle" font-size="38" font-weight="700">Operational Reliability</text>
<text x="1485" y="230" text-anchor="middle" font-size="26">Failure Modes • Fallback • Recovery</text>

