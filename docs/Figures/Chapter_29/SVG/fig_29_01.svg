<rect x="180" y="775" width="1440" height="90" rx="18" fill="#dbe5ef" stroke="#5f6b7a" stroke-width="2"/>
<text x="900" y="830" text-anchor="middle" font-size="30" font-weight="700">
Controlled authority is not the same as reliable behavior.
