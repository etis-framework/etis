site_name: Engineering Trustworthy Intelligent Systems
site_description: Software Engineering, Governance, and Operational Trust in the AI Era
site_author: Dr. William O'Connell

theme:
  name: material
  custom_dir: overrides
  favicon: assets/favicon.ico
  logo: assets/etis-logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - attr_list
  - toc:
      permalink: true

